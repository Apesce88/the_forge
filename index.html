<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="The Forge"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <title>The Forge</title>
 
  <style>
    /* ── Color Palette ── */
    :root {
      --black:       #0a0a0a;
      --grey-dark:   #111111;
      --grey-mid:    #1a1a1a;
      --grey-card:   #222222;
      --grey-light:  #2e2e2e;
      --grey-muted:  #3a3a3a;
      --lime:        #a3e635;
      --lime-dark:   #5a7d10;
      --lime-dim:    #1a2a08;
      --red:         #ef4444;
      --red-dim:     #2a0a0a;
      --gold:        #f59e0b;
      --gold-metal:  #c8922a;
      --gold-dim:    #2a1e04;
      --white:       #ffffff;
      --text-pri:    #f0f0f0;
      --text-sec:    #888888;
      --text-mute:   #444444;
      --font-title:  'Cinzel', serif;
      --font-body:   'Bebas Neue', sans-serif;
      --sat: env(safe-area-inset-top, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
      --sar: env(safe-area-inset-right, 0px);
    }
 
    /* ── Reset ── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
 
    html, body {
      height: 100%;
      background: var(--black);
      color: var(--text-pri);
      font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
      font-size: 16px;
      line-height: 1.5;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
 
    /* ── App Shell ── */
    #app {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      padding-top: var(--sat);
      padding-left: var(--sal);
      padding-right: var(--sar);
      background: var(--black);
    }
 
    #screen {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding-bottom: calc(16px + var(--sab));
    }
 
    /* ── Bottom Navigation ── */
    #bottom-nav {
      display: flex;
      background: var(--grey-dark);
      border-top: 1px solid var(--grey-light);
      padding: 8px 0 4px;
      padding-bottom: calc(8px + var(--sab));
      flex-shrink: 0;
    }
 
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px 0;
      color: var(--text-mute);
      font-family: inherit;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: color 0.15s;
    }
 
    .nav-btn.active { color: var(--gold-metal); }
 
    .nav-btn svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
 
    /* ── Home Header ── */
    .home-header {
      padding: 28px 20px 16px;
      border-bottom: 1px solid var(--grey-mid);
      margin-bottom: 16px;
    }
 
    .home-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold-metal);
      margin-bottom: 4px;
      font-family: var(--font-body);
    }
 
    .home-title {
      font-size: 30px;
      font-weight: 700;
      color: var(--text-pri);
      letter-spacing: 0.04em;
      font-family: var(--);
    }
 
    .home-subtitle {
      font-size: 12px;
      color: var(--text-sec);
      margin-top: 4px;
      letter-spacing: 0.04em;
      font-family: var(--font-body);
    }
 
    /* ── Stats Row ── */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      padding: 0 16px 16px;
    }
 
    .stat-card {
      background: #0d0d0d;
      border: 1px solid var(--grey-light);
      border-radius: 12px;
      padding: 10px 8px;
      text-align: center;
    }
 
    .stat-num {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-pri);
      line-height: 1;
    }
 
    .stat-label {
      font-size: 10px;
      color: var(--text-sec);
      margin-top: 3px;
      letter-spacing: 0.04em;
      line-height: 1.3;
      font-family: var(--font-body);
    }
 
    /* ── Day Grid ── */
    .day-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 0 16px;
    }
 
    .day-card {
      background: #0d0d0d;
      border-radius: 16px;
      padding: 16px 14px 14px;
      cursor: pointer;
      text-align: left;
      border: 1px solid var(--grey-light);
      transition: transform 0.12s, border-color 0.12s;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      /* Full width of last card if odd number */
    }
 
    .day-card:active {
      transform: scale(0.96);
    }
 
    /* Color tint overlay on card */
    .day-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      opacity: 0.04;
      pointer-events: none;
    }
 
    .day-card.lime  { border-color: var(--lime); border-width: 1.5px; }
    .day-card.lime::before  { background: var(--lime); }
 
    .day-card.red   { border-color: var(--red); border-width: 1.5px; }
    .day-card.red::before   { background: var(--red); }
 
    .day-card.gold  { border-color: var(--gold); border-width: 1.5px; }
    .day-card.gold::before  { background: var(--gold); }
 
    .day-card.grey  { border-color: var(--grey-muted); border-width: 1.5px; }
    .day-card.grey::before  { background: #888; }
 
    .day-number {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 6px;
      font-family: var(--font-body);
    }
 
    .day-card.lime  .day-number { color: var(--lime); }
    .day-card.red   .day-number { color: var(--red); }
    .day-card.gold  .day-number { color: var(--gold); }
    .day-card.grey  .day-number { color: var(--text-sec); }
 
    .day-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-pri);
      line-height: 1.3;
      margin-bottom: 3px;
      font-family: var(--font-body);
    }
 
    .day-subtitle {
      font-size: 11px;
      color: var(--text-sec);
      line-height: 1.4;
      font-family: var(--font-body);
    }
 
    /* Color bar at bottom of card */
    .day-bar {
      height: 3px;
      border-radius: 2px;
      margin-top: 14px;
      width: 28px;
    }
 
    .day-card.lime .day-bar { background: var(--lime); }
    .day-card.red  .day-bar { background: var(--red); }
    .day-card.gold .day-bar { background: var(--gold); }
    .day-card.grey .day-bar { background: var(--grey-muted); }
 
    /* Forge mark */
    .forge-mark {
      text-align: center;
      font-size: 11px;
      color: var(--text-mute);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 20px 0 8px;
      font-family: var(--font-body);
    }
 
     /* ── Day Detail View ── */
    .day-detail-header {
      padding: 20px 20px 16px;
      margin-bottom: 4px;
    }
 
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--grey-mid);
      border: 1px solid var(--grey-light);
      color: var(--text-sec);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      font-family: var(--font-body);
      letter-spacing: 0.06em;
      cursor: pointer;
      margin-bottom: 16px;
    }
 
    .back-btn svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
 
    .day-detail-badge {
      display: flex;
      align-items: center;
      gap: 14px;
    }
 
    .day-detail-num {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 900;
      font-family: var(--);
      color: var(--black);
      flex-shrink: 0;
    }
 
    .day-detail-num.lime { background: var(--lime); }
    .day-detail-num.red  { background: var(--red); }
    .day-detail-num.gold { background: var(--gold); }
    .day-detail-num.grey { background: var(--grey-muted); color: var(--text-pri); }
 
    .day-detail-info h1 {
      font-size: 20px;
      font-weight: 700;
      font-family: var(--font-title);
      color: var(--text-pri);
      line-height: 1.2;
    }
 
    .day-detail-info .detail-sub {
      font-size: 13px;
      font-family: var(--font-body);
      letter-spacing: 0.06em;
      margin-top: 2px;
    }
 
    .day-detail-info .detail-sub.lime { color: var(--lime); }
    .day-detail-info .detail-sub.red  { color: var(--red); }
    .day-detail-info .detail-sub.gold { color: var(--gold); }
    .day-detail-info .detail-sub.grey { color: var(--text-sec); }
 
    .day-focus-text {
      font-size: 11px;
      color: var(--text-mute);
      font-family: var(--font-body);
      letter-spacing: 0.06em;
      padding: 8px 20px 0;
    }
 
    .detail-divider {
      height: 1px;
      background: var(--grey-mid);
      margin: 14px 20px;
    }
 
    /* ── Tier Section ── */
    .tier-section {
      padding: 0 16px;
      margin-bottom: 24px;
    }
 
    .tier-label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--grey-mid);
    }
 
    .tier-icon {
      font-size: 15px;
    }
 
    .tier-name {
      font-size: 11px;
      font-weight: 700;
      font-family: var(--font-body);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
 
    .tier-name.lime { color: var(--lime); }
    .tier-name.red  { color: var(--red); }
    .tier-name.gold { color: var(--gold); }
    .tier-name.grey { color: var(--text-sec); }
 
    /* ── Exercise Card ── */
    .ex-card {
      background: #0d0d0d;
      border: 1px solid var(--grey-light);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 8px;
    }
 
    .ex-name {
      font-size: 14px;
      font-weight: 700;
      font-family: var(--font-title);
      color: var(--text-pri);
      margin-bottom: 10px;
    }
 
    /* Equipment tabs */
    .equip-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
 
    .equip-tab {
      flex: 1;
      padding: 5px 4px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 10px;
      font-weight: 600;
      font-family: var(--font-body);
      letter-spacing: 0.04em;
      background: var(--grey-mid);
      color: var(--text-mute);
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
 
    .equip-tab.active {
      background: var(--grey-card);
      color: var(--text-pri);
    }
 
    .equip-tab-emoji { font-size: 13px; }
    .equip-tab-label { font-size: 9px; letter-spacing: 0.04em; }
 
    .equip-content {
      font-size: 13px;
      color: var(--text-sec);
      line-height: 1.5;
      min-height: 20px;
      font-family: 'Trebuchet MS', sans-serif;
    }
 
    /* ── Field Steps (Day 03 speed day) ── */
    .field-step {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      background: #0d0d0d;
      border: 1px solid var(--grey-light);
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 8px;
    }
 
    .field-step-icon { font-size: 20px; flex-shrink: 0; }
 
    .field-step-text {
      font-size: 14px;
      color: var(--text-sec);
      line-height: 1.5;
      font-family: 'Trebuchet MS', sans-serif;
      padding-top: 2px;
    }
 
    /* ── Recovery Options ── */
    .recovery-card {
      background: #0d0d0d;
      border: 1px solid var(--grey-light);
      border-radius: 14px;
      padding: 14px 16px;
      margin: 0 16px 10px;
    }
 
    .recovery-icon { font-size: 24px; margin-bottom: 6px; }
 
    .recovery-title {
      font-size: 15px;
      font-weight: 700;
      font-family: var(--font-title);
      color: var(--text-pri);
      margin-bottom: 4px;
    }
 
    .recovery-desc {
      font-size: 13px;
      color: var(--text-sec);
      line-height: 1.6;
      font-family: 'Trebuchet MS', sans-serif;
    }
 
    /* ── Day note (e.g. tempo run) ── */
    .day-note {
      margin: 0 16px 20px;
      background: var(--grey-dim, #111);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      color: var(--text-sec);
      font-family: 'Trebuchet MS', sans-serif;
      line-height: 1.5;
      border: 1px solid var(--grey-light);
    }
 
    /* ── Coming Soon ── */
    .coming-soon {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      padding: 40px 20px;
      text-align: center;
      gap: 12px;
    }
 
    .coming-soon-icon {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      background: #0d0d0d;
      border: 1px solid var(--grey-light);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }
 
    .coming-soon-icon svg {
      width: 32px;
      height: 32px;
      stroke: var(--gold-metal);
      fill: none;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
 
    .coming-soon h2 {
      font-size: 18px;
      font-weight: 700;
      font-family: var(--font-title);
      color: var(--text-pri);
    }
 
    .coming-soon p {
      font-size: 13px;
      color: var(--text-sec);
      max-width: 260px;
      line-height: 1.6;
    }
 
    .coming-soon .forge-mark { padding: 8px 0 0; }
  </style>
</head>

        { name:'Single Arm DB Press', fw:'Single arm DB bench or floor press', mb:'Single arm cable press', bw:'Archer push-up (loads one side)' },
        { name:'Meadows Row', fw:'DB Meadows row from floor (unilateral)', mb:'Single arm cable row', bw:'Single arm inverted row' },
      ]},
      { label:'Secondary', icon:'💪', exercises:[
        { name:'Incline DB Curl', fw:'Incline bench DB curl (full stretch)', mb:'Low cable curl on incline bench', bw:'Chin-up with slow eccentric' },
        { name:'Lateral Raise Drop Sets', fw:'3 DB weights descending, no rest', mb:'Cable lateral — drop weight × 3', bw:'Plank lateral raises to failure × 3' },
        { name:'Chest-Supported Row', fw:'DB row on incline bench (chest supported)', mb:'Chest-supported row machine', bw:'Prone row with band anchored low' },
        { name:'Cable Pull-Apart', fw:'Band pull-apart', mb:'Cable pull-apart at shoulder height', bw:'Prone Y raises slow tempo' },
        { name:'Single-Leg RDL', fw:'DB single-leg RDL', mb:'Cable single-leg RDL', bw:'Bodyweight single-leg RDL slow' },
      ]},
      { label:'Accessory', icon:'✦', exercises:[
        { name:'Speed Circuit 4–5 rounds', fw:'Push-up×10→Squat×10→Pull-up×5→Sprinter sit-up×10 · rest 30s', mb:'Push-up×10→Squat×10→Pull-up×5→Sprinter sit-up×10 · rest 30s', bw:'Push-up×10→Squat×10→Pull-up×5→Sprinter sit-up×10 · rest 30s' },
      ]},
    ]
  },
  {
    num:'06', title:'Lower Explosiveness', sub:'Plyos + Tempo Run', color:'red',
    focus:'Fast-twitch development · aerobic base',
    tiers:[
      { label:'Plyometric Block — do first', icon:'⚡', exercises:[
        { name:'Broad Jumps', fw:'4 × 5 reps', mb:'4 × 5 reps', bw:'4 × 5 reps' },
        { name:'Jump Squats', fw:'3 × 8 reps', mb:'3 × 8 reps', bw:'3 × 8 reps' },
        { name:'Single-Leg Bounding', fw:'3 × 10 each side', mb:'3 × 10 each side', bw:'3 × 10 each side' },
        { name:'Pogos', fw:'3 × 20 reps', mb:'3 × 20 reps', bw:'3 × 20 reps' },
      ]},
    ],
    note:'🏃 Finish with 20–30 min tempo run at conversational pace'
  },
  {
    num:'07', title:'Recovery', sub:'True Rest', color:'grey',
    focus:'Rest or active recovery — listen to your body',
    recovery:[
      { icon:'😴', title:'True Rest', desc:'Full off day. Sleep in, eat well, let your body repair. This is training too.' },
      { icon:'🚶', title:'Active Recovery', desc:'Easy 20–30 min walk or light jog, foam rolling, yoga focused on hips, hamstrings, thoracic spine.' },
      { icon:'🧘', title:'Mobility Focus', desc:'30 min yoga: couch stretch, pigeon pose, doorway chest opener, cat-cow, world\'s greatest stretch.' },
    ]
  },
];
 
// ── State ──────────────────────────────────────────────────────────────────
var state = {
  view: 'plan',
  dayIndex: null,
  // Tracks which equipment tab is active per exercise card
  // Key: "dayIndex-tierIndex-exIndex", Value: 0/1/2
  equipTabs: {}
};
 
// ── Navigate ───────────────────────────────────────────────────────────────
function navigate(view) {
  state.view = view;
  state.dayIndex = null;
  document.querySelectorAll('.nav-btn').forEach(function(b) {
    b.classList.remove('active');
  });
  var btn = document.getElementById('nav-' + view);
  if (btn) btn.classList.add('active');
  render();
}
 
// ── Open Day ───────────────────────────────────────────────────────────────
function tapDay(index) {
  state.view = 'day';
  state.dayIndex = index;
  state.equipTabs = {}; // reset tab selections when opening a new day
  render();
  // Scroll to top of screen
  document.getElementById('screen').scrollTop = 0;
}
 
// ── Back to Plan ───────────────────────────────────────────────────────────
function goBack() {
  state.view = 'plan';
  state.dayIndex = null;
  render();
  document.getElementById('screen').scrollTop = 0;
}
 
// ── Switch Equipment Tab ───────────────────────────────────────────────────
function switchTab(key, tabIndex) {
  state.equipTabs[key] = tabIndex;
  // Only re-render the specific exercise card for performance
  var card = document.querySelector('[data-key="' + key + '"]');
  if (card) {
    var tabs = card.querySelectorAll('.equip-tab');
    var content = card.querySelector('.equip-content');
    var day = DAYS[state.dayIndex];
    var parts = key.split('-');
    var ti = parseInt(parts[1]);
    var ei = parseInt(parts[2]);
    var ex = day.tiers[ti].exercises[ei];
    var vals = [ex.fw, ex.mb, ex.bw];
    tabs.forEach(function(t, i) {
      t.classList.toggle('active', i === tabIndex);
    });
    content.textContent = vals[tabIndex];
  }
}
 
// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  var screen = document.getElementById('screen');
  if (state.view === 'plan')      screen.innerHTML = renderPlan();
  if (state.view === 'day')       screen.innerHTML = renderDay(state.dayIndex);
  if (state.view === 'exercises') screen.innerHTML = renderExercises();
  if (state.view === 'settings')  screen.innerHTML = renderSettings();
}
 
// ── Screen: Plan ───────────────────────────────────────────────────────────
function renderPlan() {
  var cardsHTML = DAYS.map(function(d, i) {
    return '<button class="day-card ' + d.color + '" onclick="tapDay(' + i + ')">'
      + '<div class="day-number">Day ' + d.num + '</div>'
      + '<div class="day-title">' + d.title + '</div>'
      + '<div class="day-subtitle">' + d.sub + '</div>'
      + '<div class="day-bar"></div>'
      + '</button>';
  }).join('');
 
  return ''
    + '<div class="home-header">'
    +   '<div class="home-eyebrow">7-Day Program</div>'
    +   '<div class="home-title">The Forge</div>'
    +   '<div class="home-subtitle">Hypertrophy &nbsp;·&nbsp; Power &nbsp;·&nbsp; Speed</div>'
    + '</div>'
    + '<div class="stats-row">'
    +   '<div class="stat-card"><div class="stat-num">2</div><div class="stat-label">Upper Days</div></div>'
    +   '<div class="stat-card"><div class="stat-num">2</div><div class="stat-label">Lower Days</div></div>'
    +   '<div class="stat-card"><div class="stat-num">1+1</div><div class="stat-label">Speed + Aux</div></div>'
    + '</div>'
    + '<div class="day-grid">' + cardsHTML + '</div>'
    + '<div class="forge-mark">The Forge &nbsp;·&nbsp; Beta v0.3</div>';
}
 
// ── Screen: Day Detail ─────────────────────────────────────────────────────
function renderDay(index) {
  var d = DAYS[index];
  var c = d.color;
  var html = '';
 
  // Header
  html += '<div class="day-detail-header">';
  html += '<button class="back-btn" onclick="goBack()">'
    + '<svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>'
    + 'Back</button>';
  html += '<div class="day-detail-badge">';
  html += '<div class="day-detail-num ' + c + '">' + d.num + '</div>';
  html += '<div class="day-detail-info">';
  html += '<h1>' + d.title + '</h1>';
  html += '<div class="detail-sub ' + c + '">' + d.sub + '</div>';
  html += '</div></div></div>';
  html += '<div class="day-focus-text">' + d.focus + '</div>';
  html += '<div class="detail-divider"></div>';
 
  // Field day (Speed & Agility)
  if (d.field) {
    html += '<div class="tier-section">';
    d.field.forEach(function(step) {
      html += '<div class="field-step">'
        + '<div class="field-step-icon">' + step.icon + '</div>'
        + '<div class="field-step-text">' + step.text + '</div>'
        + '</div>';
    });
    html += '</div>';
  }
 
  // Recovery day
  if (d.recovery) {
    d.recovery.forEach(function(r) {
      html += '<div class="recovery-card">'
        + '<div class="recovery-icon">' + r.icon + '</div>'
        + '<div class="recovery-title">' + r.title + '</div>'
        + '<div class="recovery-desc">' + r.desc + '</div>'
        + '</div>';
    });
  }
 
  // Tier sections with exercises
  if (d.tiers) {
    d.tiers.forEach(function(tier, ti) {
      html += '<div class="tier-section">';
      html += '<div class="tier-label">'
        + '<span class="tier-icon">' + tier.icon + '</span>'
        + '<span class="tier-name ' + c + '">' + tier.label + '</span>'
        + '</div>';
 
      tier.exercises.forEach(function(ex, ei) {
        var key = index + '-' + ti + '-' + ei;
        var activeTab = state.equipTabs[key] || 0;
        var vals = [ex.fw, ex.mb, ex.bw];
        var tabs = [
          { emoji:'🏋️', label:'Free Weight' },
          { emoji:'⚙️', label:'Machine/Band' },
          { emoji:'🤸', label:'Bodyweight' },
        ];
 
        // Check if all three options are identical (e.g. plyos with just reps)
        var isSimple = ex.fw === ex.mb && ex.mb === ex.bw;
 
        html += '<div class="ex-card" data-key="' + key + '">';
        html += '<div class="ex-name">' + ex.name + '</div>';
 
        if (isSimple) {
          html += '<div class="equip-content">' + ex.fw + '</div>';
        } else {
          html += '<div class="equip-tabs">';
          tabs.forEach(function(t, i) {
            html += '<button class="equip-tab' + (i === activeTab ? ' active' : '') + '"'
              + ' onclick="switchTab(\'' + key + '\',' + i + ')">'
              + '<span class="equip-tab-emoji">' + t.emoji + '</span>'
              + '<span class="equip-tab-label">' + t.label + '</span>'
              + '</button>';
          });
          html += '</div>';
          html += '<div class="equip-content">' + vals[activeTab] + '</div>';
        }
 
        html += '</div>'; // ex-card
      });
 
      html += '</div>'; // tier-section
    });
  }
 
  // Day note (e.g. tempo run reminder)
  if (d.note) {
    html += '<div class="day-note">' + d.note + '</div>';
  }
 
  html += '<div class="forge-mark">The Forge &nbsp;·&nbsp; Beta v0.3</div>';
  return html;
}
 
// ── Screen: My Exercises ───────────────────────────────────────────────────
function renderExercises() {
  return '<div class="coming-soon">'
    + '<div class="coming-soon-icon">'
    +   '<svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1" fill="currentColor"/><circle cx="3" cy="12" r="1" fill="currentColor"/><circle cx="3" cy="18" r="1" fill="currentColor"/></svg>'
    + '</div>'
    + '<h2>My Exercises</h2>'
    + '<p>Your personal exercise bank. Removed exercises live here and can be added back to any workout day.</p>'
    + '<div class="forge-mark">Coming in Phase 6</div>'
    + '</div>';
}
 
// ── Screen: Settings ───────────────────────────────────────────────────────
function renderSettings() {
  return '<div class="coming-soon">'
    + '<div class="coming-soon-icon">'
    +   '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
    + '</div>'
    + '<h2>Settings</h2>'
    + '<p>Gemini API key, auto-fill preferences, and app options will live here.</p>'
    + '<div class="forge-mark">Coming in Phase 7</div>'
    + '</div>';
}
 
// ── Boot ───────────────────────────────────────────────────────────────────
render();
</script>
