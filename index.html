<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="The Forge"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <title>The Forge</title>
 
  <style>
    /* ── Color Palette ── */
    :root {
      --black:       #0a0a0a;
      --grey-dark:   #111111;
      --grey-mid:    #1a1a1a;
      --grey-card:   #222222;
      --grey-light:  #2e2e2e;
      --grey-muted:  #3a3a3a;
      --lime:        #a3e635;
      --lime-dark:   #5a7d10;
      --lime-dim:    #1a2a08;
      --red:         #ef4444;
      --red-dim:     #2a0a0a;
      --gold:        #f59e0b;
      --gold-metal:  #c8922a;
      --gold-dim:    #2a1e04;
      --white:       #ffffff;
      --text-pri:    #f0f0f0;
      --text-sec:    #888888;
      --text-mute:   #444444;
      --font-title: 'Cinzel', serif;
      --font-body:  'Bebas Neue', sans-serif;
      --sat: env(safe-area-inset-top, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
      --sar: env(safe-area-inset-right, 0px);
    }
 
    /* ── Reset ── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
 
    html, body {
      height: 100%;
      background: var(--black);
      color: var(--text-pri);
      font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
      font-size: 16px;
      line-height: 1.5;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
 
    /* ── App Shell ── */
    #app {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      padding-top: var(--sat);
      padding-left: var(--sal);
      padding-right: var(--sar);
      background: var(--black);
    }
 
    #screen {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding-bottom: calc(16px + var(--sab));
    }
 
    /* ── Bottom Navigation ── */
    #bottom-nav {
      display: flex;
      background: var(--grey-dark);
      border-top: 1px solid var(--grey-light);
      padding: 8px 0 4px;
      padding-bottom: calc(8px + var(--sab));
      flex-shrink: 0;
    }
 
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px 0;
      color: var(--text-mute);
      font-family: inherit;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: color 0.15s;
    }
 
    .nav-btn.active { color: var(--gold-metal); }
 
    .nav-btn svg {
      width: 24px;
      height: 24px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
 
    /* ── Home Header ── */
    .home-header {
      padding: 28px 20px 16px;
      border-bottom: 1px solid var(--grey-mid);
      margin-bottom: 16px;
    }
 
    .home-eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold-metal);
      margin-bottom: 4px;
    }
 
    .home-title {
      font-size: 30px;
      font-weight: 700;
      color: var(--text-pri);
      letter-spacing: 0.04em;
      font-family: var(--font-title);
    }
 
    .home-title span {
      color: var(--lime);
    }
 
    .home-subtitle {
      font-size: 12px;
      color: var(--text-sec);
      margin-top: 4px;
      letter-spacing: 0.04em;
    }
 
    /* ── Stats Row ── */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      padding: 0 16px 16px;
    }
 
    .stat-card {
      background: #0d0d0d;
      border: 1px solid var(--grey-light);
      border-radius: 12px;
      padding: 10px 8px;
      text-align: center;
    }
 
    .stat-num {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-pri);
      line-height: 1;
    }
 
    .stat-label {
      font-size: 10px;
      color: var(--text-sec);
      margin-top: 3px;
      letter-spacing: 0.04em;
      line-height: 1.3;
    }
 
    /* ── Day Grid ── */
    .day-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 0 16px;
    }
 
    .day-card {
      background: #0d0d0d;
      border-radius: 16px;
      padding: 16px 14px 14px;
      cursor: pointer;
      text-align: left;
      border: 1px solid var(--grey-light);
      transition: transform 0.12s, border-color 0.12s;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      /* Full width of last card if odd number */
    }
 
    .day-card:active {
      transform: scale(0.96);
    }
 
    /* Color tint overlay on card */
    .day-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      opacity: 0.04;
      pointer-events: none;
    }
 
    .day-card.lime  { border-color: var(--lime); border-width: 1.5px; }
    .day-card.lime::before  { background: var(--lime); }
 
    .day-card.red   { border-color: var(--red); border-width: 1.5px; }
    .day-card.red::before   { background: var(--red); }
 
    .day-card.gold  { border-color: var(--gold); border-width: 1.5px; }
    .day-card.gold::before  { background: var(--gold); }
 
    .day-card.grey  { border-color: var(--grey-muted); border-width: 1.5px; }
    .day-card.grey::before  { background: #888; }
 
    .day-number {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
 
    .day-card.lime  .day-number { color: var(--lime); }
    .day-card.red   .day-number { color: var(--red); }
    .day-card.gold  .day-number { color: var(--gold); }
    .day-card.grey  .day-number { color: var(--text-sec); }
 
    .day-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-pri);
      line-height: 1.3;
      margin-bottom: 3px;
    }
 
    .day-subtitle {
      font-size: 11px;
      color: var(--text-sec);
      line-height: 1.4;
    }
 
    /* Color bar at bottom of card */
    .day-bar {
      height: 3px;
      border-radius: 2px;
      margin-top: 14px;
      width: 28px;
    }
 
    .day-card.lime .day-bar { background: var(--lime); }
    .day-card.red  .day-bar { background: var(--red); }
    .day-card.gold .day-bar { background: var(--gold); }
    .day-card.grey .day-bar { background: var(--grey-muted); }
 
    /* Forge mark */
    .forge-mark {
      text-align: center;
      font-size: 11px;
      color: var(--text-mute);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 20px 0 8px;
    }
 
    /* ── Coming Soon ── */
    .coming-soon {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      padding: 40px 20px;
      text-align: center;
      gap: 12px;
    }
 
    .coming-soon-icon {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      background: #0d0d0d;
      border: 1px solid var(--grey-light);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }
 
    .coming-soon-icon svg {
      width: 32px;
      height: 32px;
      stroke: var(--gold-metal);
      fill: none;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
 
    .coming-soon h2 {
      font-size: 18px;
      font-weight: 700;
      font-family: 'Cinzel', serif;
      color: var(--text-pri);
    }
 
    .coming-soon p {
      font-size: 13px;
      color: var(--text-sec);
      max-width: 260px;
      line-height: 1.6;
    }
 
    .coming-soon .forge-mark {
      padding: 8px 0 0;
    }
  </style>
</head>
<body>
<div id="app">
  <div id="screen"></div>
 
  <nav id="bottom-nav">
    <button class="nav-btn active" id="nav-plan" onclick="navigate('plan')">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 2 C10 5 7 7 7 11 C7 15.5 9.5 18 12 19 C14.5 18 17 15.5 17 11 C17 7 14 5 12 2 Z"/>
        <line x1="12" y1="18" x2="12" y2="10"/>
        <polyline points="9.5 12.5 12 10 14.5 12.5"/>
      </svg>
      Plan
    </button>
 
    <button class="nav-btn" id="nav-exercises" onclick="navigate('exercises')">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <line x1="8" y1="6" x2="21" y2="6"/>
        <line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/>
        <circle cx="3" cy="6" r="1" fill="currentColor"/>
        <circle cx="3" cy="12" r="1" fill="currentColor"/>
        <circle cx="3" cy="18" r="1" fill="currentColor"/>
      </svg>
      My Exercises
    </button>
 
    <button class="nav-btn" id="nav-settings" onclick="navigate('settings')">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
      Settings
    </button>
  </nav>
</div>
 
<script>
  // ── Day Data ───────────────────────────────────────────────────────────────
  // Each day has a color class matching our CSS: lime / red / gold / grey
  var DAYS = [
    { num:'01', title:'Chest & Shoulders', sub:'Hypertrophy',        color:'lime' },
    { num:'02', title:'Lower Body',        sub:'Power + Hamstring',  color:'red'  },
    { num:'03', title:'Speed & Agility',   sub:'Athletic Movement',  color:'gold' },
    { num:'04', title:'Back & Chest',      sub:'Max / Power + Arms', color:'lime' },
    { num:'05', title:'Lower Explosiveness', sub:'Plyos + Tempo Run',color:'red'  },
    { num:'06', title:'Extra / Aux',       sub:'Volume & Size',      color:'lime' },
    { num:'07', title:'Recovery',          sub:'True Rest',          color:'grey' },
  ];
 
  // ── State ──────────────────────────────────────────────────────────────────
  var state = { view: 'plan' };
 
  // ── Navigate ───────────────────────────────────────────────────────────────
  function navigate(view) {
    state.view = view;
    document.querySelectorAll('.nav-btn').forEach(function(b) {
      b.classList.remove('active');
    });
    var btn = document.getElementById('nav-' + view);
    if (btn) btn.classList.add('active');
    render();
  }
 
  // ── Render ─────────────────────────────────────────────────────────────────
  function render() {
    var screen = document.getElementById('screen');
    if (state.view === 'plan')      screen.innerHTML = renderPlan();
    if (state.view === 'exercises') screen.innerHTML = renderExercises();
    if (state.view === 'settings')  screen.innerHTML = renderSettings();
  }
 
  // ── Screen: Plan ───────────────────────────────────────────────────────────
  function renderPlan() {
    // Build day cards HTML
    var cardsHTML = DAYS.map(function(d, i) {
      return '<button class="day-card ' + d.color + '" onclick="tapDay(' + i + ')">'
        + '<div class="day-number">Day ' + d.num + '</div>'
        + '<div class="day-title">' + d.title + '</div>'
        + '<div class="day-subtitle">' + d.sub + '</div>'
        + '<div class="day-bar"></div>'
        + '</button>';
    }).join('');
 
    return ''
      + '<div class="home-header">'
      +   '<div class="home-eyebrow">7-Day Program</div>'
      +   '<div class="home-title">The Forge</div>'
      +   '<div class="home-subtitle">Hypertrophy &nbsp;·&nbsp; Power &nbsp;·&nbsp; Speed</div>'
      + '</div>'
      + '<div class="stats-row">'
      +   '<div class="stat-card"><div class="stat-num">2</div><div class="stat-label">Upper Days</div></div>'
      +   '<div class="stat-card"><div class="stat-num">2</div><div class="stat-label">Lower Days</div></div>'
      +   '<div class="stat-card"><div class="stat-num">1+1</div><div class="stat-label">Speed + Aux</div></div>'
      + '</div>'
      + '<div class="day-grid">' + cardsHTML + '</div>'
      + '<div class="forge-mark">The Forge &nbsp;·&nbsp; Beta v0.2</div>';
  }
 
  // ── Day tap (placeholder — Phase 3 wires this up) ─────────────────────────
  function tapDay(index) {
    // Phase 3 will navigate to the day detail view
    // For now just a visual confirmation it's tappable
    var day = DAYS[index];
    alert('Day ' + day.num + ' — ' + day.title + '\n\nFull workout view coming in Phase 3.');
  }
 
  // ── Screen: My Exercises ───────────────────────────────────────────────────
  function renderExercises() {
    return '<div class="coming-soon">'
      + '<div class="coming-soon-icon">'
      +   '<svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1" fill="currentColor"/><circle cx="3" cy="12" r="1" fill="currentColor"/><circle cx="3" cy="18" r="1" fill="currentColor"/></svg>'
      + '</div>'
      + '<h2>My Exercises</h2>'
      + '<p>Your personal exercise bank. Removed exercises live here and can be added back to any workout day.</p>'
      + '<div class="forge-mark">Coming in Phase 6</div>'
      + '</div>';
  }
 
  // ── Screen: Settings ───────────────────────────────────────────────────────
  function renderSettings() {
    return '<div class="coming-soon">'
      + '<div class="coming-soon-icon">'
      +   '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      + '</div>'
      + '<h2>Settings</h2>'
      + '<p>Gemini API key, auto-fill preferences, and app options will live here.</p>'
      + '<div class="forge-mark">Coming in Phase 7</div>'
      + '</div>';
  }
 
  // ── Boot ───────────────────────────────────────────────────────────────────
  render();
</script>
</body>
</html>
