<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="The Forge"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <title>The Forge</title>
  <style>
    :root {
      --black:       #0a0a0a;
      --grey-dark:   #111111;
      --grey-mid:    #1a1a1a;
      --grey-card:   #222222;
      --grey-light:  #2e2e2e;
      --grey-muted:  #3a3a3a;
      --lime:        #a3e635;
      --lime-dark:   #5a7d10;
      --lime-dim:    #1a2a08;
      --red:         #ef4444;
      --red-dim:     #2a0a0a;
      --gold:        #f59e0b;
      --gold-metal:  #c8922a;
      --gold-dim:    #2a1e04;
      --gold-light:  #F2D57A;
      --gold-gradient: linear-gradient(to top, #8B6A1F 0%, #D4AF37 35%, #FEFEFE 55%, #E8CC6A 75%, #8B6A1F 100%);
      --text-pri:    #f0f0f0;
      --text-sec:    #888888;
      --text-mute:   #444444;
      --font-title:  'Cinzel', serif;
      --font-body:   'Bebas Neue', sans-serif;
      --sat: env(safe-area-inset-top, 0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left, 0px);
      --sar: env(safe-area-inset-right, 0px);
    }
 
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
 
    html, body {
      height: 100%; background: var(--black); color: var(--text-pri);
      font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
      font-size: 16px; line-height: 1.5; overflow: hidden; -webkit-font-smoothing: antialiased;
    }
 
    #app {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      padding-top: var(--sat); padding-left: var(--sal); padding-right: var(--sar);
      background: var(--black);
    }
 
    #screen {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain; padding-bottom: calc(16px + var(--sab));
    }
 
    /* ── Bottom Nav ── */
    #bottom-nav {
      display: flex; background: var(--grey-dark);
      border-top: 1px solid var(--grey-light);
      padding: 8px 0 calc(8px + var(--sab)); flex-shrink: 0;
    }
 
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
      background: none; border: none; cursor: pointer; padding: 6px 0;
      color: var(--gold-light); font-family: var(--font-body);
      font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
      text-transform: uppercase; transition: color 0.15s;
    }
 
    .nav-btn.active { 
      background: #2a1f05;
      border: 1.5px solid #D4AF37;
      color: #D4AF37;
      box-shadow: 0 0 12px rgba(212,175,55,0.4);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 12px rgba(212,175,55,0.4); }
      50%       { box-shadow: 0 0 22px rgba(212,175,55,0.75); }
    }
 
    .nav-btn svg {
      width: 24px; height: 24px; stroke: currentColor; fill: none;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    }
 
    /* ── Home ── */
    .home-header {
      padding: 28px 20px 16px;
      border-bottom: 1px solid var(--grey-mid);
      margin-bottom: 16px;
    }
 
    .home-eyebrow {
      font-size: 11px; font-weight: 600; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--text-pri); margin-bottom: 4px;
      font-family: var(--font-body);
    }
 
      .home-title {
        font-size: 30px;
        font-weight: 700;
        letter-spacing: 0.04em;
        font-family: var(--font-title);
        background: var(--gold-gradient);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
      }
 
    .home-subtitle {
      font-size: 12px; color: var(--text-sec); margin-top: 4px;
      letter-spacing: 0.04em; font-family: var(--font-body);
    }
 
    .stats-row {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 8px; padding: 0 16px 16px;
    }
 
    .stat-card {
      background: #0d0d0d; border: 1px solid var(--grey-light);
      border-radius: 12px; padding: 10px 8px; text-align: center;
    }
 
    .stat-num { font-size: 22px; font-weight: 700; color: var(--text-pri); line-height: 1; font-family: var(--font-title); }
    .stat-label { font-size: 10px; color: var(--text-sec); margin-top: 3px; letter-spacing: 0.04em; line-height: 1.3; font-family: var(--font-body); }

    .stat-card-sm { background: #0d0d0d; border: 1px solid var(--grey-light); border-radius: 10px; padding: 8px 6px; text-align: center; }
    .stat-num-sm { font-size: 16px; font-weight: 700; color: var(--text-pri); line-height: 1; font-family: var(--font-title); }
    .stat-label-sm { font-size: 8px; color: var(--text-sec); margin-top: 3px; letter-spacing: 0.04em; line-height: 1.25; font-family: var(--font-body); text-transform: uppercase; }
 
    .day-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 0 16px; }
 
    .day-card {
      background: #0d0d0d; border-radius: 16px; padding: 16px 14px 14px;
      cursor: pointer; text-align: left; border: 1.5px solid var(--grey-light);
      transition: transform 0.12s; position: relative;
      min-height: 120px;
    }
 
    .day-card:active { transform: scale(0.96); }
 
    .day-card::before {
      content: ''; position: absolute; inset: 0; border-radius: 16px;
      opacity: 0.04; pointer-events: none;
    }
 
    .day-card.lime { border-color: var(--lime); box-shadow: 0 0 10px 2px rgba(163,230,53,0.25), 0 0 24px 4px rgba(163,230,53,0.10); }
    .day-card.lime::before { background: var(--lime); }
    .day-card.red  { border-color: var(--red);  box-shadow: 0 0 12px 3px rgba(239,68,68,0.15),  0 0 28px 6px rgba(239,68,68,0.06); }
    .day-card.red::before  { background: var(--red); }
    .day-card.gold { border-color: var(--gold); box-shadow: 0 0 12px 3px rgba(200,146,42,0.20), 0 0 28px 6px rgba(200,146,42,0.08); }
    .day-card.gold::before { background: var(--gold); }
    .day-card.grey { border-color: #a0a0a0; box-shadow: 0 0 12px 3px rgba(200,200,200,0.25), 0 0 28px 6px rgba(200,200,200,0.10); }
    .day-card.grey::before { background: #111; }
 
    .day-number { font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; font-family: var(--font-body); }
    .day-card.lime .day-number { color: var(--lime); }
    .day-card.red  .day-number { color: var(--red); }
    .day-card.gold .day-number { color: var(--gold); }
    .day-card.grey .day-number { color: var(--text-sec); }
 
    .day-title { font-size: 14px; font-weight: 600; color: var(--text-pri); line-height: 1.3; margin-bottom: 3px; font-family: var(--font-title); }
    .day-subtitle { font-size: 11px; color: var(--text-sec); line-height: 1.4; font-family: var(--font-body); }
 
    .day-bar { height: 3px; border-radius: 2px; margin-top: 14px; width: 28px; }
    .day-card.lime .day-bar { background: var(--lime); }
    .day-card.red  .day-bar { background: var(--red); }
    .day-card.gold .day-bar { background: var(--gold); }
    .day-card.grey .day-bar { background: var(--grey-muted); }
 
    .forge-mark {
      text-align: center; font-size: 11px; color: var(--text-mute);
      letter-spacing: 0.12em; text-transform: uppercase; padding: 20px 0 8px;
      font-family: var(--font-body);
    }
 
    /* ── Day Detail ── */
    .day-detail-header { padding: 20px 20px 16px; margin-bottom: 4px; }
 
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--grey-mid); border: 1px solid var(--grey-light);
      color: var(--text-sec); border-radius: 20px; padding: 6px 14px;
      font-size: 13px; font-family: var(--font-body); letter-spacing: 0.06em;
      cursor: pointer; margin-bottom: 16px;
    }
 
    .back-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
 
    .day-detail-badge { display: flex; align-items: center; gap: 14px; }
 
    .day-detail-num {
      width: 52px; height: 52px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 900; font-family: var(--font-title);
      color: var(--black); flex-shrink: 0;
    }
 
    .day-detail-num.lime { background: var(--lime); }
    .day-detail-num.red  { background: var(--red); }
    .day-detail-num.gold { background: var(--gold); }
    .day-detail-num.grey { background: var(--grey-muted); color: var(--text-pri); }
 
    .day-detail-info h1 { font-size: 20px; font-weight: 700; font-family: var(--font-title); color: var(--text-pri); line-height: 1.2; }
    .day-detail-info .detail-sub { font-size: 13px; font-family: var(--font-body); letter-spacing: 0.06em; margin-top: 2px; }
    .day-detail-info .detail-sub.lime { color: var(--lime); }
    .day-detail-info .detail-sub.red  { color: var(--red); }
    .day-detail-info .detail-sub.gold { color: var(--gold); }
    .day-detail-info .detail-sub.grey { color: var(--text-sec); }
 
    .day-focus-text { font-size: 11px; color: var(--text-mute); font-family: var(--font-body); letter-spacing: 0.06em; padding: 8px 20px 0; }
    .detail-divider { height: 1px; background: var(--grey-mid); margin: 14px 20px; }
 
    .tier-section { padding: 0 16px; margin-bottom: 24px; }
 
    .tier-label { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--grey-mid); }
    .tier-icon { display: none; }
    .tier-name { font-size: 14px; font-weight: 700; font-family: var(--font-body); letter-spacing: 0.1em; text-transform: uppercase; }
    .tier-name.lime { color: var(--lime); }
    .tier-name.red  { color: var(--red); }
    .tier-name.gold { color: var(--gold); }
    .tier-name.grey { color: var(--text-sec); }
 
    /* ── Exercise Card (Day View) ── */
    .ex-card {
      background: #0d0d0d; border: 1px solid var(--grey-light);
      border-radius: 12px; padding: 12px 14px; margin-bottom: 8px;
    }
 
    .ex-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .ex-name { font-size: 14px; font-weight: 700; font-family: var(--font-title); color: var(--text-pri); }
 
    .ex-menu-btn {
      background: var(--grey-mid); border: none; border-radius: 8px;
      color: var(--text-sec); font-size: 15px; cursor: pointer; padding: 2px 8px; line-height: 1.4;
    }
 
    .ex-actions { display: flex; gap: 8px; margin-bottom: 10px; }
 
    .ex-action-btn {
      flex: 1; padding: 7px; border-radius: 10px; font-size: 12px;
      font-family: var(--font-body); letter-spacing: 0.04em;
      font-weight: 600; cursor: pointer; border: 1px solid;
    }
 
    .ex-action-edit { background: rgba(255,255,255,0.05); border-color: var(--grey-light); color: var(--text-pri); }
    .ex-action-remove { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.3); color: var(--red); }
 
    .equip-tabs { display: flex; gap: 6px; margin-bottom: 10px; }
 
    .equip-tab {
      flex: 1; padding: 8px 4px; border-radius: 8px; border: 1px solid transparent; cursor: pointer;
      font-size: 10px; font-weight: 600; font-family: var(--font-body); letter-spacing: 0.05em;
      background: var(--grey-mid); color: var(--text-mute); transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
      text-transform: uppercase;
    }
 
    .equip-tab.active {
      background: var(--grey-card); color: var(--text-pri);
      border-color: var(--grey-muted);
      box-shadow: 0 0 8px rgba(120,120,120,0.25);
    }
    .equip-tab-emoji { font-size: 13px; }
    .equip-tab-label { font-size: 9px; letter-spacing: 0.04em; }
    .equip-content { font-size: 13px; color: var(--text-sec); line-height: 1.5; min-height: 20px; }
 
    .field-step { display: flex; gap: 12px; align-items: flex-start; background: #0d0d0d; border: 1px solid var(--grey-light); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; }
    .field-step-icon { font-size: 20px; flex-shrink: 0; }
    .field-step-text { font-size: 14px; color: var(--text-sec); line-height: 1.5; padding-top: 2px; }
 
    .recovery-card { background: #0d0d0d; border: 1px solid var(--grey-light); border-radius: 14px; padding: 14px 16px; margin: 0 16px 10px; }
    .recovery-icon { font-size: 24px; margin-bottom: 6px; }
    .recovery-title { font-size: 15px; font-weight: 700; font-family: var(--font-title); color: var(--text-pri); margin-bottom: 4px; }
    .recovery-desc { font-size: 13px; color: var(--text-sec); line-height: 1.6; }
 
    .day-note { margin: 0 16px 20px; background: #0d0d0d; border-radius: 12px; padding: 12px 14px; font-size: 14px; color: var(--text-sec); line-height: 1.5; border: 1px solid var(--grey-light); }
 
    .day-empty-tier {
      background: #0d0d0d; border: 1.5px dashed var(--grey-muted);
      border-radius: 12px; padding: 20px; text-align: center;
      font-size: 13px; color: var(--text-mute); font-family: var(--font-body);
      letter-spacing: 0.04em; margin-bottom: 8px;
    }
 
    /* ── My Exercises Screen ── */
    .lib-header {
      padding: 28px 20px 16px;
      border-bottom: 1px solid var(--grey-mid);
    }
 
    .lib-title {
      font-size: 26px;
      font-weight: 700;
      font-family: var(--font-title);
      margin-bottom: 4px;
      background: var(--gold-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .lib-sub { font-size: 12px; color: var(--text-sec); font-family: var(--font-body); letter-spacing: 0.04em; }
 
    /* Category tabs */
    .cat-tabs {
      display: flex; gap: 6px; padding: 12px 16px;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
 
    .cat-tabs::-webkit-scrollbar { display: none; }
 
    .cat-tab {
      flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
      border: 1px solid var(--grey-light); background: #0d0d0d;
      color: var(--text-mute); font-size: 12px; font-family: var(--font-body);
      letter-spacing: 0.06em; cursor: pointer; transition: all 0.15s;
      text-transform: uppercase;
    }
 
    .cat-tab.active { background: var(--lime-dim); border-color: var(--lime); color: var(--lime); }
 
    /* Exercise library card */
    .lib-ex-card {
      background: #0d0d0d; border: 1px solid var(--grey-light);
      border-radius: 12px; padding: 12px 14px; margin-bottom: 8px;
    }
 
    .lib-ex-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .lib-ex-name { font-size: 14px; font-weight: 700; font-family: var(--font-title); color: var(--text-pri); }
    .lib-ex-cat { font-size: 10px; font-family: var(--font-body); letter-spacing: 0.08em; text-transform: uppercase; }
    .lib-ex-cat.upper   { color: var(--lime); }
    .lib-ex-cat.lower   { color: var(--red); }
    .lib-ex-cat.power   { color: var(--gold); }
    .lib-ex-cat.core    { color: #a78bfa; }
    .lib-ex-cat.recovery { color: var(--text-sec); }
 
    .lib-ex-options { display: flex; flex-direction: column; gap: 3px; margin-top: 6px; }
    .lib-ex-option { font-size: 12px; color: var(--text-mute); line-height: 1.4; }
    .lib-ex-option span { color: var(--text-sec); }
 
    .lib-ex-menu-btn {
      background: var(--grey-mid); border: none; border-radius: 8px;
      color: var(--text-sec); font-size: 15px; cursor: pointer; padding: 2px 8px;
    }

    
    .lib-ex-actions { display: flex; gap: 8px; margin-top: 8px; }
   
    .picker-ex-btn {
      width: 100%; background: #0d0d0d; border: 1px solid var(--grey-light);
      border-radius: 12px; padding: 12px 14px; margin-bottom: 8px;
      text-align: left; cursor: pointer;
    }

    .picker-ex-btn:active { transform: scale(0.98); }

    .picker-ex-name {
      font-size: 14px; font-weight: 700; font-family: var(--font-title);
      color: var(--text-pri); margin-bottom: 4px;
    }

    .picker-ex-opts {
      font-size: 11px; color: var(--text-mute);
      font-family: 'Trebuchet MS', sans-serif; line-height: 1.4; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--grey-mid); font-style: italic;
    }

    .ex-notes {
      font-size: 12px;
      color: var(--text-pri);
      font-family: 'Trebuchet MS', sans-serif;
      line-height: 1.5;
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid var(--grey-mid);
      font-style: italic;
    }
    
    .lib-ex-action {
      flex: 1; padding: 7px; border-radius: 10px; font-size: 12px;
      font-family: var(--font-body); letter-spacing: 0.04em;
      cursor: pointer; border: 1px solid;
    }
    .lib-ex-edit   { background: rgba(255,255,255,0.05); border-color: var(--grey-light); color: var(--text-pri); }
    .lib-ex-delete { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.3); color: var(--red); }
 
    .lib-section-pad { padding: 0 16px; }
 
    .lib-add-btn {
      width: 100%; padding: 14px; border-radius: 14px; margin-top: 8px;
      border: 1.5px dashed var(--gold-metal); background: var(--gold-dim);
      color: var(--gold-metal); font-size: 13px; font-family: var(--font-body);
      letter-spacing: 0.06em; cursor: pointer;
    }
   
    .add-ex-btn {
      width: 100%; padding: 10px; border-radius: 12px; margin-top: 4px;
      border: 1.5px dashed var(--gold-metal); background: var(--gold-dim);
      color: var(--gold-metal); font-size: 12px; font-family: var(--font-body);
      letter-spacing: 0.06em; cursor: pointer;
    }
 
    .lib-empty {
      text-align: center; padding: 40px 20px;
      font-size: 13px; color: var(--text-mute);
      font-family: var(--font-body); letter-spacing: 0.04em; line-height: 1.8;
    }
 
    .lib-empty-icon { font-size: 36px; margin-bottom: 10px; }
 
    /* ── Modal / Sheet ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.82);
      display: flex; align-items: flex-end; justify-content: center; z-index: 100;
    }
 
    .modal-sheet {
      background: #161616; border-radius: 22px 22px 0 0;
      width: 100%; max-width: 480px; padding: 20px 20px 40px;
      border: 1px solid var(--grey-light); max-height: 90vh; overflow-y: auto;
    }
 
    .modal-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--grey-muted); margin: 0 auto 18px; }
    .modal-title { font-size: 16px; font-weight: 700; font-family: var(--font-title); color: var(--text-pri); margin-bottom: 16px; }
 
    .form-label { font-size: 11px; font-family: var(--font-body); letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-mute); margin-bottom: 6px; display: block; }
 
    .form-input {
      width: 100%; background: rgba(255,255,255,0.06); border: 1px solid var(--grey-light);
      border-radius: 10px; padding: 11px 13px; color: var(--text-pri); font-size: 14px;
      outline: none; margin-bottom: 12px; font-family: 'Trebuchet MS', sans-serif;
    }

    .form-textarea {
      resize: none;
      height: 72px;
      line-height: 1.5;
    }
 
    .form-input:focus { border-color: var(--lime); }
 
    .form-select {
      width: 100%; background: rgba(255,255,255,0.06); border: 1px solid var(--grey-light);
      border-radius: 10px; padding: 11px 13px; color: var(--text-pri); font-size: 14px;
      outline: none; margin-bottom: 12px; font-family: var(--font-body);
      letter-spacing: 0.04em; -webkit-appearance: none; cursor: pointer;
    }
 
    .form-section-label {
      font-size: 11px; font-family: var(--font-body); letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--lime); margin: 4px 0 10px;
      padding-bottom: 6px; border-bottom: 1px solid var(--grey-mid);
    }
 
    .form-row { display: flex; gap: 10px; margin-top: 6px; }
 
    .btn-cancel {
      flex: 1; padding: 13px; border-radius: 12px;
      border: 1px solid var(--grey-light); background: transparent;
      color: var(--text-sec); font-size: 14px; font-family: var(--font-body);
      letter-spacing: 0.06em; cursor: pointer;
    }
 
    .btn-save {
      flex: 2; padding: 13px; border-radius: 12px; border: none;
      background: var(--lime); color: var(--black); font-size: 14px;
      font-family: var(--font-body); letter-spacing: 0.06em; font-weight: 700; cursor: pointer;
    }
 
    .btn-save:disabled { background: var(--grey-muted); color: var(--text-mute); cursor: not-allowed; }

  /* ── Settings ── */
  .settings-btn {
    display: inline-flex;
    justify-content: space-between;
    align-items: center;

    width: 220px; /* adjust to taste */

    padding: 10px 14px;
    margin-bottom: 10px;

    border-radius: 20px;
    border: 1px solid var(--grey-light);

    background: #0d0d0d;
    color: var(--text-mute);

    font-size: 12px;
    font-family: var(--font-body);
    letter-spacing: 0.06em;

  }

  .settings-btn:hover {
    border-color: var(--lime);
    color: var(--lime);
  }

  .settings-btn.active {
    width: 100%;
    background: var(--lime-dim);

    color: var(--lime);
  }

    /* ── Proving Grounds ── */
    .pg-head { padding: 24px 20px 12px; }
    .pg-eye { font-size: 10px; letter-spacing: 0.2em; color: var(--text-pri); text-transform: uppercase; margin-bottom: 4px; font-family: var(--font-body); } 
    .pg-title { font-size: 30px; font-weight: 700; font-family: var(--font-title); background: var(--gold-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.1; margin-bottom: 4px; }
    .pg-sub { font-size: 10px; color: var(--text-mute); letter-spacing: 0.08em; text-transform: uppercase; font-family: var(--font-body); }
    .pg-divider { display: flex; align-items: center; gap: 8px; padding: 10px 20px; }
    .pg-divider-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--gold-metal), transparent); }
    .pg-divider-mark { color: var(--gold-metal); font-size: 12px; opacity: 0.5; }

    /* ============================================================
   PROVING GROUNDS — Alternating card glow
   Two @keyframes: one pulses the Gauntlet (red/gold),
   one pulses the Signet (lime green).
   animation-delay on .signet offsets it so they never
   peak at the same time — gives a breathing, alive feel.
   ============================================================ */

  @keyframes gauntlet-pulse {
    0%, 100% { box-shadow: 0 0 8px 2px rgba(239,68,68,0.15), 0 0 24px 4px rgba(239,68,68,0.05); }
    50%       { box-shadow: 0 0 18px 6px rgba(239,68,68,0.35), 0 0 40px 10px rgba(200,146,42,0.15); }
  }

  @keyframes signet-pulse {
    0%, 100% { box-shadow: 0 0 8px 2px rgba(239,68,68,0.15), 0 0 24px 4px rgba(239,68,68,0.05); }
    50%       { box-shadow: 0 0 18px 6px rgba(239,68,68,0.35), 0 0 40px 10px rgba(200,146,42,0.15); }
  }

    .pg-cards { padding: 0 12px 24px; display: flex; flex-direction: column; gap: 20px; }
    .pg-card { border-radius: 16px; overflow: hidden; position: relative; cursor: pointer; transition: transform 0.12s; }
    .pg-card:active { transform: scale(0.98); }
    .pg-card.gauntlet { background: #130808; border: 1px solid rgba(239,68,68,0.4); animation: gauntlet-pulse 3s ease-in-out infinite; }
    .pg-card.signet   { background: #12100a; border: 1px solid rgba(200,146,42,0.45); animation: signet-pulse 3s ease-in-out infinite; animation-delay: 1.5s; }

    /* card inner padding wrapper */
    .pg-card-inner { padding: 18px 16px 14px; }

    /* tag pill */
    .pg-card-tag { display: inline-flex; align-items: center; gap: 5px; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; font-family: var(--font-body); }
    .pg-card.gauntlet .pg-card-tag { background: rgba(239,68,68,0.10); border: 1px solid rgba(239,68,68,0.35); color: var(--red); }
    .pg-card.signet   .pg-card-tag { background: rgba(200,146,42,0.10); border: 1px solid rgba(200,146,42,0.35); color: var(--gold-metal); }

    /* title */
    .pg-card-title { font-size: 24px; font-weight: 700; font-family: var(--font-title); color: var(--text-pri); margin-bottom: 6px; line-height: 1; }
    .pg-card.gauntlet .pg-card-title { text-shadow: 0 0 24px rgba(239,68,68,0.3); }
    .pg-card.signet   .pg-card-title { text-shadow: 0 0 24px rgba(200,146,42,0.3); }

    /* desc */
    .pg-card-desc { font-size: 11px; color: var(--text-sec); line-height: 1.6; margin-bottom: 12px; }

    /* preview pips strip */
    .pg-preview-strip { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; }
    .pg-preview-pip { font-size: 11px; font-family: var(--font-body); letter-spacing: 0.1em; padding: 5px 12px; border-radius: 4px; }
    .pg-card.gauntlet .pg-preview-pip { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); color: rgba(239,68,68,0.75); }
    .pg-card.signet   .pg-preview-pip { background: rgba(200,146,42,0.08); border: 1px solid rgba(200,146,42,0.2); color: rgba(200,146,42,0.75); }

    /* signet mini-slot grid inside hub card */
    .pg-signet-slots { display: grid; grid-template-columns: repeat(5,1fr); gap: 5px; margin-bottom: 10px; }
    .pg-signet-slot { background: rgba(200,146,42,0.05); border: 1px solid rgba(200,146,42,0.15); border-radius: 8px; padding: 8px 4px; text-align: center; }
    .pg-signet-slot-icon { font-size: 18px; line-height: 1; }
    .pg-signet-slot-name { font-size: 7px; font-family: var(--font-body); letter-spacing: 0.04em; color: var(--text-mute); }

    /* card divider */
    .pg-card-divider { height: 1px; margin: 0 0 12px; }
    .pg-card.gauntlet .pg-card-divider { background: linear-gradient(to right, rgba(239,68,68,0.2), transparent); }
    .pg-card.signet   .pg-card-divider { background: linear-gradient(to right, rgba(200,146,42,0.2), transparent); }

    /* CTA row */
    .pg-card-cta { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; font-family: var(--font-body); display: flex; align-items: center; gap: 4px; }
    .pg-card.gauntlet .pg-card-cta { color: var(--red); }
    .pg-card.signet   .pg-card-cta { color: var(--gold-metal); }

    /* bottom glow bar */
    .pg-card-glow { position: absolute; bottom: 0; left: 0; right: 0; height: 2px; }
    .pg-card.gauntlet .pg-card-glow { background: linear-gradient(to right, transparent, var(--red), transparent); }
    .pg-card.signet   .pg-card-glow { background: linear-gradient(to right, transparent, var(--gold-metal), transparent); }

    .pg-lore { text-align: center; font-size: 10px; color: var(--text-mute); letter-spacing: 0.1em; text-transform: uppercase; padding: 10px 0 16px; font-family: var(--font-body); }
    .pg-coming { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; padding: 40px 20px; text-align: center; gap: 10px; }
    .pg-coming h2 { font-size: 20px; font-family: var(--font-title); background: var(--gold-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .pg-coming p { font-size: 13px; color: var(--text-sec); line-height: 1.6; max-width: 260px; }
    .pg-back-btn { display: inline-flex; align-items: center; gap: 6px; background: var(--grey-mid); border: 1px solid var(--grey-light); color: var(--text-sec); border-radius: 20px; padding: 6px 14px; font-size: 13px; font-family: var(--font-body); letter-spacing: 0.06em; cursor: pointer; margin: 20px 20px 0; }

    /* ── Signet Screen ── */
    .sgt-header { padding: 20px 20px 8px; }
    .sgt-title { font-size: 26px; font-weight: 700; font-family: var(--font-title); background: var(--gold-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.1; margin-bottom: 4px; }
    .sgt-sub { font-size: 11px; color: var(--text-sec); line-height: 1.5; font-family: var(--font-body); letter-spacing: 0.04em; }

    .sgt-divider { display: flex; align-items: center; gap: 8px; padding: 12px 20px 16px; }
    .sgt-divider-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--gold-metal), transparent); }
    .sgt-divider-text { font-size: 9px; font-family: var(--font-body); letter-spacing: 0.18em; color: var(--gold-metal); white-space: nowrap; opacity: 0.6; }

    /* 2-col grid — Commander spans full width via .sgt-full */
    .sgt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 12px 24px; }

    .sgt-card {
      border-radius: 14px; padding: 16px 12px 14px; cursor: pointer;
      transition: transform 0.12s; position: relative; overflow: hidden;
      background: #0e0b07; border: 1px solid rgba(200,146,42,0.2);
      text-align: center;
    }
    .sgt-card:active { transform: scale(0.96); }

    /* Commander full-width card */
    .sgt-full { grid-column: 1 / -1; text-align: left; display: flex; align-items: center; gap: 14px; }
    .sgt-full .sgt-emblem { margin: 0; flex-shrink: 0; }

    /* Emblem circle — color pulled from --sa set inline per card */
    .sgt-emblem {
      width: 52px; height: 52px; border-radius: 50%;
      margin: 0 auto 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      background: var(--sa2); border: 1.5px solid var(--sa);
      box-shadow: 0 0 12px var(--sa2);
    }

    .sgt-card-name { font-size: 13px; font-weight: 700; font-family: var(--font-title); color: var(--text-pri); margin-bottom: 3px; line-height: 1.1; }
    .sgt-card-adv  { font-size: 9px; font-family: var(--font-body); letter-spacing: 0.1em; color: var(--sa); margin-bottom: 4px; }
    .sgt-card-tag  { font-size: 10px; font-family: var(--font-body); letter-spacing: 0.04em; color: var(--text-mute); line-height: 1.4; }

    /* Bottom glow bar — color from --sa */
    .sgt-card-glow { position: absolute; bottom: 0; left: 0; right: 0; height: 1.5px; background: linear-gradient(to right, transparent, var(--sa), transparent); }

    /* ── Signet Detail ── */
    .sgt-detail-header { padding: 20px 20px 14px; }
    .sgt-detail-emblem {
      width: 80px; height: 80px; border-radius: 50%; margin-bottom: 14px;
      display: flex; align-items: center; justify-content: center; font-size: 38px;
      background: var(--sa2); border: 2px solid var(--sa); box-shadow: 0 0 28px var(--sa2);
    }
    .sgt-detail-name { font-size: 28px; font-weight: 700; font-family: var(--font-title); color: var(--text-pri); line-height: 1; margin-bottom: 4px; }
    .sgt-detail-adv  { font-size: 11px; font-family: var(--font-body); letter-spacing: 0.12em; color: var(--sa); margin-bottom: 8px; }
    .sgt-detail-tagline { font-size: 13px; color: var(--text-sec); line-height: 1.5; }

    /* Stat pip block */
    .sgt-stats-block { margin: 0 16px 20px; background: #0a0807; border: 1px solid rgba(200,146,42,0.15); border-radius: 14px; padding: 16px; }
    .sgt-stats-title { font-size: 10px; font-family: var(--font-body); letter-spacing: 0.14em; color: var(--gold-metal); margin-bottom: 14px; }
    .sgt-stat-row    { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
    .sgt-stat-label  { font-size: 10px; font-family: var(--font-body); letter-spacing: 0.06em; color: var(--text-sec); width: 72px; flex-shrink: 0; }
    .sgt-stat-pips   { display: flex; gap: 3px; flex: 1; }

    /* Each pip is a small rectangle — filled ones glow in signet accent color */
    .sgt-pip        { width: 14px; height: 8px; border-radius: 2px; background: var(--grey-mid); border: 1px solid var(--grey-light); }
    .sgt-pip-filled { background: var(--sa); border-color: var(--sa); box-shadow: 0 0 4px var(--sa); }

    .sgt-stat-level { font-size: 9px; font-family: var(--font-body); letter-spacing: 0.06em; color: var(--text-mute); width: 56px; text-align: right; }

    /* Description block */
    .sgt-desc-block { margin: 0 16px 20px; }
    .sgt-desc-title { font-size: 10px; font-family: var(--font-body); letter-spacing: 0.14em; color: var(--gold-metal); margin-bottom: 8px; }
    .sgt-desc-text  { font-size: 12px; color: var(--text-sec); line-height: 1.7; }

    /* Forge CTA button — background is the signet accent color */
    .sgt-forge-btn {
      margin: 0 16px 32px; padding: 14px; border-radius: 14px; border: none;
      width: calc(100% - 32px); font-size: 14px; font-family: var(--font-body);
      letter-spacing: 0.1em; cursor: pointer; display: block;
      background: var(--sa); color: var(--black); font-weight: 700;
      box-shadow: 0 0 20px var(--sa2); transition: opacity 0.15s;
    }
    .sgt-forge-btn:active { opacity: 0.8; }
    
/* ── Gauntlet Screen ── */
    @keyframes waypoint-ping {
      0%   { transform: scale(1);   opacity: 0.8; }
      70%  { transform: scale(2.4); opacity: 0; }
      100% { transform: scale(2.4); opacity: 0; }
    }
    @keyframes scan-line {
      0%   { top: -2px; }
      100% { top: 100%; }
    }

    .gnt-header { padding: 20px 20px 10px; }
    .gnt-title  { font-size: 26px; font-weight: 700; font-family: var(--font-title); color: var(--text-pri); line-height: 1; margin-bottom: 4px; text-shadow: 0 0 20px rgba(239,68,68,0.3); }
    .gnt-sub    { font-size: 10px; color: var(--text-mute); letter-spacing: 0.1em; font-family: var(--font-body); text-transform: uppercase; }

    .gnt-toggle { display: flex; margin: 0 16px 16px; border: 1px solid var(--grey-light); border-radius: 10px; overflow: hidden; }
    .gnt-toggle-btn { flex: 1; padding: 9px; font-size: 11px; font-family: var(--font-body); letter-spacing: 0.08em; background: transparent; border: none; color: var(--text-mute); cursor: pointer; }
    .gnt-toggle-btn.active { background: var(--grey-mid); color: var(--text-pri); }

    .gnt-map-wrap {
      margin: 0 12px 12px; border-radius: 14px; overflow: hidden;
      border: 1px solid rgba(239,68,68,0.2); position: relative; height: 400px;
      background:
        repeating-linear-gradient(0deg,   transparent, transparent 39px, rgba(255,255,255,0.016) 39px, rgba(255,255,255,0.016) 40px),
        repeating-linear-gradient(90deg,  transparent, transparent 39px, rgba(255,255,255,0.016) 39px, rgba(255,255,255,0.016) 40px),
        radial-gradient(ellipse at 28% 38%, rgba(239,68,68,0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 72% 62%, rgba(200,146,42,0.05) 0%, transparent 45%),
        radial-gradient(ellipse at 55% 18%, rgba(163,230,53,0.04) 0%, transparent 40%),
        #060a06;
    }

    .gnt-scan {
      position: absolute; left: 0; right: 0; height: 3px; pointer-events: none; z-index: 2;
      background: linear-gradient(to bottom, transparent, rgba(163,230,53,0.12), transparent);
      animation: scan-line 7s linear infinite;
    }

    .gnt-corner { position: absolute; width: 14px; height: 14px; z-index: 3; }
    .gnt-tl { top: 10px; left: 10px;  border-top: 1.5px solid rgba(163,230,53,0.45); border-left:  1.5px solid rgba(163,230,53,0.45); }
    .gnt-tr { top: 10px; right: 10px; border-top: 1.5px solid rgba(163,230,53,0.45); border-right: 1.5px solid rgba(163,230,53,0.45); }
    .gnt-bl { bottom: 10px; left: 10px;  border-bottom: 1.5px solid rgba(163,230,53,0.45); border-left:  1.5px solid rgba(163,230,53,0.45); }
    .gnt-br { bottom: 10px; right: 10px; border-bottom: 1.5px solid rgba(163,230,53,0.45); border-right: 1.5px solid rgba(163,230,53,0.45); }

    .gnt-hud-tl { position: absolute; top: 12px; left: 30px; font-size: 8px; font-family: var(--font-body); letter-spacing: 0.1em; color: rgba(163,230,53,0.3); z-index: 3; }
    .gnt-hud-tr { position: absolute; top: 12px; right: 30px; font-size: 8px; font-family: var(--font-body); letter-spacing: 0.08em; color: rgba(163,230,53,0.3); text-align: right; z-index: 3; line-height: 1.7; }

    .gnt-wp { position: absolute; z-index: 5; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; cursor: pointer; }
    .gnt-wp-ring { position: absolute; width: 20px; height: 20px; border-radius: 50%; animation: waypoint-ping 2.5s cubic-bezier(0,0,0.2,1) infinite; }
    .gnt-wp-dot  { width: 11px; height: 11px; border-radius: 50%; position: relative; z-index: 2; border: 2px solid rgba(255,255,255,0.25); }
    .gnt-wp-label { font-size: 8px; font-family: var(--font-body); letter-spacing: 0.05em; white-space: nowrap; margin-top: 6px; padding: 2px 6px; border-radius: 3px; position: relative; z-index: 2; }

    .gnt-wp-lime .gnt-wp-ring  { background: rgba(163,230,53,0.22); }
    .gnt-wp-lime .gnt-wp-dot   { background: var(--lime); box-shadow: 0 0 8px rgba(163,230,53,0.9); }
    .gnt-wp-lime .gnt-wp-label { background: rgba(163,230,53,0.1); color: var(--lime); border: 1px solid rgba(163,230,53,0.3); }

    .gnt-wp-red .gnt-wp-ring  { background: rgba(239,68,68,0.22); animation-delay: 0.8s; }
    .gnt-wp-red .gnt-wp-dot   { background: var(--red); box-shadow: 0 0 8px rgba(239,68,68,0.9); }
    .gnt-wp-red .gnt-wp-label { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }

    .gnt-wp-gold .gnt-wp-ring  { background: rgba(245,158,11,0.22); animation-delay: 1.6s; }
    .gnt-wp-gold .gnt-wp-dot   { background: var(--gold); box-shadow: 0 0 8px rgba(245,158,11,0.9); }
    .gnt-wp-gold .gnt-wp-label { background: rgba(200,146,42,0.1); color: var(--gold); border: 1px solid rgba(200,146,42,0.3); }

    .gnt-legend { display: flex; gap: 16px; padding: 10px 16px 16px; flex-wrap: wrap; }
    .gnt-leg-item { display: flex; align-items: center; gap: 5px; font-size: 9px; font-family: var(--font-body); letter-spacing: 0.06em; color: var(--text-mute); }
    .gnt-leg-dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    .gnt-list { padding: 0 12px 20px; display: flex; flex-direction: column; gap: 10px; }
    .gnt-event-card { border-radius: 12px; overflow: hidden; position: relative; cursor: pointer; transition: transform 0.12s; }
    .gnt-event-card:active { transform: scale(0.98); }
    .gnt-ev-red  { background: #130808; border: 1px solid rgba(239,68,68,0.35); }
    .gnt-ev-gold { background: #12100a; border: 1px solid rgba(200,146,42,0.35); }
    .gnt-ev-lime { background: #091008; border: 1px solid rgba(163,230,53,0.28); }

    .gnt-event-inner { padding: 14px 14px 12px; }
    .gnt-event-type  { font-size: 9px; font-family: var(--font-body); letter-spacing: 0.12em; margin-bottom: 5px; }
    .gnt-ev-red  .gnt-event-type { color: var(--red); }
    .gnt-ev-gold .gnt-event-type { color: var(--gold); }
    .gnt-ev-lime .gnt-event-type { color: var(--lime); }

    .gnt-event-name { font-size: 17px; font-weight: 700; font-family: var(--font-title); color: var(--text-pri); margin-bottom: 3px; }
    .gnt-event-meta { font-size: 10px; color: var(--text-mute); font-family: var(--font-body); letter-spacing: 0.06em; margin-bottom: 8px; }
    .gnt-event-desc { font-size: 11px; color: var(--text-sec); line-height: 1.55; margin-bottom: 10px; }
    .gnt-event-tags { display: flex; gap: 5px; flex-wrap: wrap; }
    .gnt-event-tag  { font-size: 9px; font-family: var(--font-body); letter-spacing: 0.05em; padding: 2px 8px; border-radius: 3px; }
    .gnt-ev-red  .gnt-event-tag { background: rgba(239,68,68,0.08);  border: 1px solid rgba(239,68,68,0.2);  color: rgba(239,68,68,0.7); }
    .gnt-ev-gold .gnt-event-tag { background: rgba(200,146,42,0.08); border: 1px solid rgba(200,146,42,0.2); color: rgba(200,146,42,0.7); }
    .gnt-ev-lime .gnt-event-tag { background: rgba(163,230,53,0.06); border: 1px solid rgba(163,230,53,0.2); color: rgba(163,230,53,0.7); }

    .gnt-event-glow { position: absolute; bottom: 0; left: 0; right: 0; height: 1.5px; }
    .gnt-ev-red  .gnt-event-glow { background: linear-gradient(to right, transparent, var(--red),  transparent); }
    .gnt-ev-gold .gnt-event-glow { background: linear-gradient(to right, transparent, var(--gold), transparent); }
    .gnt-ev-lime .gnt-event-glow { background: linear-gradient(to right, transparent, var(--lime), transparent); }
    
    /* ── Coming Soon ── */ 
    /* ── Profile ── */
    .coming-soon { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; padding: 40px 20px; text-align: center; gap: 12px; }
    .coming-soon-icon { width: 64px; height: 64px; border-radius: 20px; background: #0d0d0d; border: 1px solid var(--grey-light); display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
    .coming-soon-icon svg { width: 32px; height: 32px; stroke: var(--gold-metal); fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
    .coming-soon h2 { font-size: 18px; font-weight: 700; font-family: var(--font-title); background: var(--gold-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .coming-soon p { font-size: 13px; color: var(--text-sec); max-width: 260px; line-height: 1.6; }

  /* ── Profile Shell Button ── */
  .profile-shell-btn {
    position: fixed;
    top: calc(12px + var(--sat));
    right: calc(12px + var(--sar));
    z-index: 200;
    background: #0a0a0a;
    border: 1.5px solid #D4AF37;
    border-radius: 10px;
    width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 0 12px rgba(212,175,55,0.4);
    animation: pulse 2s infinite;
    transition: background 0.2s;
  }
  .profile-shell-btn:active { background: #2a1f05; }

  /* ── Profile Slide-Up Sheet ── */
  .profile-sheet-backdrop {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(2px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
  }
  .profile-sheet-backdrop.open { opacity: 1; pointer-events: all; }

    border-top: 1px solid #c8922a44;

    transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);

    width: 36px; height: 4px;

  try {

        state.days[5].title = 'Explosiveness';

async function doAutoFill() {
  console.log('DO AUTOFILL START');
  if (!state.modal) return;
  var m = state.modal;

  // Read directly from DOM inputs — most reliable source
  var nameInput = document.querySelector('#modal-layer input[oninput*="name"]');
  var fwInput   = document.querySelector('#modal-layer input[oninput*="fw"]');
  var mbInput   = document.querySelector('#modal-layer input[oninput*="mb"]');
  var bwInput   = document.querySelector('#modal-layer input[oninput*="bw"]');

  var name = nameInput ? nameInput.value.trim() : m.name.trim();
  var fw   = fwInput   ? fwInput.value.trim()   : (m.fw||'');
  var mb   = mbInput   ? mbInput.value.trim()   : (m.mb||'');
  var bw   = bwInput   ? bwInput.value.trim()   : (m.bw||'');

  if (!name) return;

  // Update state with current values
  m.name = name;
  m.fw = fw;
  m.mb = mb;
  m.bw = bw;

  // Show loading
  var btn = document.querySelector('.autofill-btn');
  if (btn) { btn.textContent = '⏳ Filling...'; btn.disabled = true; }

  // Try Gemini first
  var result = await geminiAutoFill(name, fw, mb, bw);

  // Fall back to built-in database
  if (!result) {
    result = autoFill(name, fw, mb, bw);
  }

  if (result) {
    if (result.fw && !fw) m.fw = result.fw;
    if (result.mb && !mb) m.mb = result.mb;
    if (result.bw && !bw) m.bw = result.bw;
  }

  // Re-render modal with filled values
  var existing = document.getElementById('modal-layer');
  if (existing) existing.remove();
  var div = document.createElement('div');
  div.id = 'modal-layer';
  div.innerHTML = renderModal();
  document.getElementById('app').appendChild(div);
}

// ── Update modal form field ────────────────────────────────────────────────
function updateModal(field, value) {
  if (!state.modal) return;
  state.modal[field] = value;
  // Category change swaps field labels — re-render modal only
  if (field === 'cat') {
    var existing = document.getElementById('modal-layer');
    if (existing) existing.remove();
    var div = document.createElement('div');
    div.id = 'modal-layer';
    div.innerHTML = renderModal();
    document.getElementById('app').appendChild(div);
    return;
  }
  // Only update the button — don't re-render the whole screen
  if (field === 'name') {
    var saveBtn = document.querySelector('.btn-save');
    if (saveBtn) {
      if (value.trim()) {
        saveBtn.removeAttribute('disabled');
      } else {
        saveBtn.setAttribute('disabled', 'disabled');
      }
    }
  }
}

  var ex = state.days[di].tiers[ti].exercises[ei];

  var exists = state.library.some(function(e){ return e.name === ex.name; });
  if (!exists) {

    }).join('');
    var listHTML = filtered.length === 0
      ? '<div class="lib-empty"><div class="lib-empty-icon">📋</div>No exercises in this category.</div>'
      : filtered.map(function(ex) {
          return '<button class="picker-ex-btn" onclick="addFieldEx(' + m.di + ',\'' + ex.id + '\')">'
            + '<div class="picker-ex-name">' + ex.name + '</div>'
            + '<div class="picker-ex-opts">🏋️ ' + ex.fw + '</div>'
            + '</button>';
        }).join('');
    return '<div class="modal-overlay" onclick="closeModal()">'
      + '<div class="modal-sheet" onclick="event.stopPropagation()">'
      + '<div class="modal-handle"></div>'
      + '<div class="modal-title">Add Exercise</div>'
      + '<div class="cat-tabs">' + tabsHTML + '</div>'
      + '<div style="max-height:55vh;overflow-y:auto;padding:0 4px;">' + listHTML + '</div>'
      + '<div style="margin-top:12px;">'
      + '<button class="btn-cancel" onclick="closeModal()">Cancel</button>'
      + '</div>'
      + '</div></div>';
  }
  
  if (m.mode === 'addDay') {
    var cats = ['upper','lower','power','dynamic','core','recovery'];
    var activeCat = state.pickerCat || 'upper';
    var filtered = state.library.filter(function(e) {
      return e.cat === activeCat;
    });

    var tabsHTML = cats.map(function(c) {
      return '<button class="cat-tab' + (activeCat === c ? ' active' : '')
        + '" onclick="setPickerCat(\'' + c + '\')">'
        + c.charAt(0).toUpperCase() + c.slice(1)
        + '</button>';
    }).join('');

    var listHTML = filtered.length === 0
      ? '<div class="lib-empty"><div class="lib-empty-icon">📋</div>No exercises in this category.</div>'
      : filtered.map(function(ex) {
          return '<button class="picker-ex-btn" onclick="addExToDay(' + m.di + ',' + m.ti + ',\'' + ex.id + '\')">'
            + '<div class="picker-ex-name">' + ex.name + '</div>'
            + '<div class="picker-ex-opts">' + ex.fw + '</div>'
            + '</button>';
        }).join('');

    return '<div class="modal-overlay" onclick="closeModal()">'
      + '<div class="modal-sheet" onclick="event.stopPropagation()">'
      + '<div class="modal-handle"></div>'
      + '<div class="modal-title">Add Exercise</div>'
      + '<div class="cat-tabs">' + tabsHTML + '</div>'
      + '<div style="max-height:55vh;overflow-y:auto;padding:0 4px;">' + listHTML + '</div>'
      + '<div style="margin-top:12px;">'
      + '<button class="btn-cancel" onclick="closeModal()">Cancel</button>'
      + '</div>'
      + '</div></div>';
  }
  
  var isEdit = m.mode === 'editLib' || m.mode === 'editDay';
  var title = isEdit ? 'Edit Exercise' : 'Add Exercise';
  var saveLabel = isEdit ? 'Save Changes' : 'Add to Library';
  var saveFn = m.mode === 'editDay' ? 'saveEditDayExercise()' : 'saveLibExercise()';
  var showCat = m.mode !== 'editDay';
 
  var catOptions = ['upper','lower','power','dynamic','core','recovery'].map(function(c){
    return '<option value="'+c+'"'+(m.cat===c?' selected':'')+'>'+c.charAt(0).toUpperCase()+c.slice(1)+'</option>';
  }).join('');
 
  return '<div class="modal-overlay" onclick="closeModal()">'
    + '<div class="modal-sheet" onclick="event.stopPropagation()">'
    + '<div class="modal-handle"></div>'
    + '<div class="modal-title">'+title+'</div>'
 
    + '<label class="form-label">Exercise Name</label>'
    + '<input class="form-input" type="text" placeholder="e.g. Barbell Good Mornings" value="'+escHtml(m.name)+'" oninput="updateModal(\'name\',this.value)"/>'
 
    + (showCat ? '<label class="form-label">Category</label><select class="form-select" onchange="updateModal(\'cat\',this.value)">'+catOptions+'</select>' : '')

    + '<label class="form-label">Notes <span style="color:var(--text-mute);font-size:10px;font-family:\'Trebuchet MS\',sans-serif;">(optional · 120 chars)</span></label>'
    + '<textarea class="form-input form-textarea" maxlength="120" placeholder="e.g. Superset with face pulls. Eccentric focus." oninput="updateModal(\'notes\',this.value)">' + escHtml(m.notes||'') + '</textarea>'
    + '<button class="autofill-btn" onclick="doAutoFill()" style="width:100%;padding:11px;border-radius:12px;border:1px solid var(--lime-dark);background:var(--lime-dim);color:var(--lime);font-size:13px;font-family:var(--font-body);letter-spacing:0.06em;cursor:pointer;margin-bottom:12px;">✨ Auto-fill missing options</button>'
    + '<div class="form-section-label">' + (m.cat === 'dynamic' ? 'Movement Details' : 'Equipment Options') + '</div>'

    + '<label class="form-label">' + (m.cat === 'dynamic' ? 'Distance' : 'Free Weight') + '</label>'
    + '<input class="form-input" type="text" placeholder="' + (m.cat === 'dynamic' ? 'e.g. 10 yards per rep' : 'e.g. Barbell Good Mornings') + '" value="'+escHtml(m.fw)+'" oninput="updateModal(\'fw\',this.value)"/>'

    + '<label class="form-label">' + (m.cat === 'dynamic' ? 'Total Volume' : 'Machine / Band') + '</label>'
    + '<input class="form-input" type="text" placeholder="' + (m.cat === 'dynamic' ? 'e.g. 300 yards total' : 'e.g. Cable pull-through') + '" value="'+escHtml(m.mb)+'" oninput="updateModal(\'mb\',this.value)"/>'

    + '<label class="form-label">' + (m.cat === 'dynamic' ? 'Rest' : 'Bodyweight') + '</label>'
    + '<input class="form-input" type="text" placeholder="' + (m.cat === 'dynamic' ? 'e.g. Full recovery between reps' : 'e.g. Single-leg RDL slow tempo') + '" value="'+escHtml(m.bw)+'" oninput="updateModal(\'bw\',this.value)"/>'
 
    + '<div class="form-row">'
    + '<button class="btn-cancel" onclick="closeModal()">Cancel</button>'
    + '<button class="btn-save" onclick="'+saveFn+'" '+(m.name.trim()?'':'disabled')+'>'+saveLabel+'</button>'
    + '</div>'
    + '</div></div>';
}

function renderGauntlet(view) {
  state.gauntletView = view;

  var backBtn = '<button class="pg-back-btn" onclick="navigate(\'grounds\')">'
    + '<svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><polyline points="15 18 9 12 15 6"/></svg>'
    + 'Back</button>';

  var header = '<div class="gnt-header">'
    + '<div class="pg-eye">Challenge Arena</div>'
    + '<div class="gnt-title">The Gauntlet</div>'
    + '<div class="gnt-sub">Find your next test · Own the map</div>'
    + '</div>';

  var toggle = '<div class="gnt-toggle">'
    + '<button class="gnt-toggle-btn' + (view === 'map' ? ' active' : '') + '" onclick="renderGauntlet(\'map\')">🗺 MAP</button>'
    + '<button class="gnt-toggle-btn' + (view === 'list' ? ' active' : '') + '" onclick="renderGauntlet(\'list\')">☰ LIST</button>'
    + '</div>';

  var content = view === 'map' ? buildGauntletMap() : buildGauntletList();

  document.getElementById('screen').innerHTML = backBtn + header + toggle + content
    + '<div class="forge-mark">The Gauntlet · Find Your Test</div>';
}

function buildGauntletMap() {
  var pairs = [[0,1],[1,2],[2,3],[3,4],[0,4],[1,3]];
  var lines = pairs.map(function(p) {
    var a = GAUNTLET_EVENTS[p[0]].wp, b = GAUNTLET_EVENTS[p[1]].wp;
    return '<line x1="' + a.x + '%" y1="' + a.y + '%" x2="' + b.x + '%" y2="' + b.y + '%"'
      + ' stroke="rgba(163,230,53,0.12)" stroke-width="1" stroke-dasharray="4 7"/>';
  }).join('');

  var waypoints = GAUNTLET_EVENTS.map(function(ev, i) {
    return '<div class="gnt-wp gnt-wp-' + ev.color + '" style="left:' + ev.wp.x + '%;top:' + ev.wp.y + '%;" onclick="showGauntletEvent(' + i + ')">'
      + '<div class="gnt-wp-ring"></div>'
      + '<div class="gnt-wp-dot"></div>'
      + '<div class="gnt-wp-label">' + ev.name + '</div>'
      + '</div>';
  }).join('');

  return '<div class="gnt-map-wrap">'
    + '<div class="gnt-scan"></div>'
    + '<div class="gnt-corner gnt-tl"></div>'
    + '<div class="gnt-corner gnt-tr"></div>'
    + '<div class="gnt-corner gnt-bl"></div>'
    + '<div class="gnt-corner gnt-br"></div>'
    + '<div class="gnt-hud-tl">34°03\'N 118°14\'W</div>'
    + '<div class="gnt-hud-tr">EVENTS: ' + GAUNTLET_EVENTS.length + '<br/>STATUS: LIVE</div>'
    + '<svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;">' + lines + '</svg>'
    + waypoints
    + '</div>'
    + '<div class="gnt-legend">'
    + '<div class="gnt-leg-item"><div class="gnt-leg-dot" style="background:var(--lime);box-shadow:0 0 5px rgba(163,230,53,0.7);"></div><span>Athletics</span></div>'
    + '<div class="gnt-leg-item"><div class="gnt-leg-dot" style="background:var(--red);box-shadow:0 0 5px rgba(239,68,68,0.7);"></div><span>Obstacle</span></div>'
    + '<div class="gnt-leg-item"><div class="gnt-leg-dot" style="background:var(--gold);box-shadow:0 0 5px rgba(245,158,11,0.7);"></div><span>Fitness Race</span></div>'
    + '</div>';
}

function buildGauntletList() {
  return '<div class="gnt-list">'
    + GAUNTLET_EVENTS.map(function(ev, i) {
        return '<div class="gnt-event-card gnt-ev-' + ev.color + '" onclick="showGauntletEvent(' + i + ')">'
          + '<div class="gnt-event-inner">'
          + '<div class="gnt-event-type">' + ev.type + '</div>'
          + '<div class="gnt-event-name">' + ev.name + '</div>'

          + '</div>'

          + '<div class="gnt-event-glow"></div>'

}

async function geminiAutoFill(name, fw, mb, bw) {
  console.log('GEMINI CALL START', name);
  var settings = loadSettings();
  if (!settings.geminiKey) return null;

  // Build list of what's already filled and what's missing
  var filled = [];
  var missing = [];
  if (fw.trim()) filled.push('free weight: "' + fw.trim() + '"');
  else missing.push({ key: 'fw', label: 'free weight (barbell/dumbbell)' });
  if (mb.trim()) filled.push('machine/band: "' + mb.trim() + '"');
  else missing.push({ key: 'mb', label: 'machine or resistance band' });
  if (bw.trim()) filled.push('bodyweight: "' + bw.trim() + '"');
  else missing.push({ key: 'bw', label: 'bodyweight only (no equipment)' });

  if (missing.length === 0) return null;

  var filledDesc = filled.length > 0
    ? 'The user already provided: ' + filled.join('; ') + '. Use these as your reference for which muscles to target.'
    : '';

  var missingDesc = missing.map(function(m) {
    return '"' + m.key + '": ' + m.label + ' exercise';
  }).join(', ');

  var prompt = 'You are a certified strength and conditioning coach.\n'
    + 'Exercise name: "' + name + '"\n'
    + filledDesc + '\n'
    + 'Look at the exercise(s) already provided above, identify the PRIMARY muscles being trained, '
    + 'and return ONLY the missing alternatives that train those EXACT same muscles.\n'
    + 'Missing fields needed: ' + missingDesc + '\n'
    + 'Rules:\n'
    + '- Each answer must be one specific exercise, under 10 words\n'
    + '- Must be practical for a Planet Fitness commercial gym\n'
    + '- Must target the same primary muscles as the provided exercise\n'
    + '- Do NOT repeat any exercise already listed\n'
    + '- Return ONLY a raw JSON object, no markdown, no explanation\n'
    + 'Example: {"mb": "Cable pull-through 3x12", "bw": "Single-leg RDL slow tempo"}';

  try {
    console.log('Calling Gemini with name:', name, 'key:', settings.geminiKey ? 'SET' : 'MISSING');
    var response = await fetch(
      'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + settings.geminiKey,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }]
        })
      }
    );

  if (!response.ok) {
    console.error(
      'Gemini Error',
      response.status,
      await response.text()
    );
    return null;
  }

    var data = await response.json();
    var text = data.candidates[0].content.parts[0].text;
    var clean = text.replace(/```json|```/g, '').trim();
    var parsed = JSON.parse(clean);
    return parsed;

  } catch(e) {
    console.error('Gemini Exception:', e);
    return null;
  }
}

function detectGroup(t){
  if(!t) return null;
  var l=t.toLowerCase();
  for(var i=0;i<KEYWORDS.length;i++){
    if(KEYWORDS[i].w.some(function(k){return l.includes(k);})) return KEYWORDS[i].g;
  }
  return null;
}

  function autoFill(name,fw,mb,bw){
    var g=detectGroup(name)||detectGroup(fw)||detectGroup(mb)||detectGroup(bw);
    if(!g||!EXERCISE_DB[g]) return null;
    var db=EXERCISE_DB[g];
    var used=[fw,mb,bw].filter(Boolean).map(function(s){return s.toLowerCase();});
    var pick=function(arr){
      var av=arr.filter(function(e){
        return !used.some(function(u){
          return e.toLowerCase().includes(u.slice(0,5))||u.includes(e.toLowerCase().slice(0,5));
        });
      });
      var pool=av.length?av:arr;
      return pool[Math.floor(Math.random()*pool.length)];
    };
    return{fw:fw||pick(db.fw),mb:mb||pick(db.mb),bw:bw||pick(db.bw)};
  }
  
  function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function getMainLifts() {
  var lifts = [];
  state.days.forEach(function(d) {
    if (!d.tiers) return;
    d.tiers.forEach(function(tier) {
      tier.exercises.forEach(function(ex) {
        if (ex.mainLift) lifts.push({ name: ex.name, day: d.title, dayColor: d.color });
      });
    });
  });
  return lifts;
}

function setRecord1RM(li, value) {
  var lifts = getMainLifts();
  if (!lifts[li]) return;
  var recs = loadRecords();
  var v = parseFloat(value);
  if (v > 0) recs[lifts[li].name] = { oneRM: v, updatedAt: Date.now() };
  else delete recs[lifts[li].name];
  saveRecords(recs);
  renderHeroScreen();
}

function toggleRMCalc(li) {
  state.rmCalc = (state.rmCalc && state.rmCalc.li === li) ? null : { li: li, weight: '', reps: '5' };
  renderHeroScreen();
}

function updateRMCalc(field, value) {
  if (state.rmCalc) state.rmCalc[field] = value;
}

function applyRMCalc(li) {
  if (!state.rmCalc) return;
  var w = parseFloat(state.rmCalc.weight);
  var reps = parseInt(state.rmCalc.reps, 10) || 5;
  var lifts = getMainLifts();
  if (!w || w <= 0 || !lifts[li]) return;
  var recs = loadRecords();
  recs[lifts[li].name] = { oneRM: w * (1 + reps / 30), updatedAt: Date.now() };
  saveRecords(recs);
  state.rmCalc = null;
  renderHeroScreen();
}

function addFieldEx(dayIndex, exId) {
  var ex = state.library.find(function(e) { return e.id === exId; });
  if (!ex) return;
  if (!state.days[dayIndex].exercises) state.days[dayIndex].exercises = [];
  if (state.days[dayIndex].exercises.length >= 3) return;
  state.days[dayIndex].exercises.push({
    name: ex.name,
    fw: ex.fw,
    mb: ex.mb,
    bw: ex.bw
  });
  saveDays();
  closeModal();
}

function removeFieldEx(dayIndex, ei) {
  state.days[dayIndex].exercises.splice(ei, 1);
  saveDays();
  state.openMenuId = null;
  render();
}

// // ── Journey Stats ──────────────────────────────────────────────────────────
function getWeekStart(offset) {
  // Monday 00:00 of current week; offset -1 = last week
  var now = new Date();
  var day = now.getDay(); // 0=Sun
  var diff = (day === 0 ? 6 : day - 1); // days since Monday
  var monday = new Date(now.getFullYear(), now.getMonth(), now.getDate() - diff);
  if (offset) monday.setDate(monday.getDate() + offset * 7);
  return monday.getTime();
}

function logVolume(log) {
  return log.exercises.reduce(function(acc, ex) {
    return acc + ex.sets.reduce(function(a, set) {
      if (set.loadType === 'bw' || !set.load) return a;
      return a + ((parseFloat(set.load) || 0) * (parseInt(set.effort) || 0));
    }, 0);
  }, 0);
}

function logDistance(log) {
  // Yards converted to miles (1760 yd = 1 mi), summed with mile distances
  return log.exercises.reduce(function(acc, ex) {
    if (ex.type !== 'running') return acc;
    return acc + ex.sets.reduce(function(a, set) {
      var d = parseFloat(set.distance) || 0;
      return a + (ex.unit === 'yd' ? d / 1760 : d);
    }, 0);
  }, 0);
}

function computeJourneyStats() {
  var logs = loadLogs();
  var weekStart = getWeekStart(0);
  var lastWeekStart = getWeekStart(-1);
  var now = new Date();
  var monthStart = new Date(now.getFullYear(), now.getMonth(), 1).getTime();

  var stats = {
    weekCount: 0, monthCount: 0,
    upperVol: 0, lowerVol: 0, runDist: 0,
    overloads: []
  };

  // Main lift volume maps: exName → volume
  var thisWeekMains = {};
  var lastWeekMains = {};

  logs.forEach(function(log) {
    var t = log.completedAt || log.startedAt;

    if (t >= weekStart) {
      stats.weekCount++;
      var vol = logVolume(log);
      if (log.dayColor === 'red') stats.lowerVol += vol;
      else if (log.dayColor === 'lime') stats.upperVol += vol;
      stats.runDist += logDistance(log);
    }
    if (t >= monthStart) stats.monthCount++;

    // Main lift volume per exercise, this week vs last week
    var bucket = null;
    if (t >= weekStart) bucket = thisWeekMains;
    else if (t >= lastWeekStart && t < weekStart) bucket = lastWeekMains;
    if (bucket) {
      log.exercises.forEach(function(ex) {
        if (!ex.mainLift) return;
        var exVol = ex.sets.reduce(function(a, set) {
          if (set.loadType === 'bw' || !set.load) return a;
          return a + ((parseFloat(set.load) || 0) * (parseInt(set.effort) || 0));
        }, 0);
        bucket[ex.exName] = (bucket[ex.exName] || 0) + exVol;
      });
    }
  });

  // Overload: this week's main lift volume beats last week's (both must exist)
  Object.keys(thisWeekMains).forEach(function(name) {
    if (lastWeekMains[name] && thisWeekMains[name] > lastWeekMains[name]) {
      stats.overloads.push({
        name: name,
        gain: Math.round(((thisWeekMains[name] - lastWeekMains[name]) / lastWeekMains[name]) * 100)
      });
    }
  });

  return stats;
}
  
var jSwipeX = null;

function jSwipeStart(e) {
  jSwipeX = e.touches[0].clientX;
}

function jSwipeEnd(e, logId) {
  if (jSwipeX === null) return;
  var deltaX = e.changedTouches[0].clientX - jSwipeX;
  jSwipeX = null;
  if (deltaX > 60) {
    state.journeySwiped = logId;
    render();
  } else if (state.journeySwiped) {
    state.journeySwiped = null;
    render();
  }
}

function deleteJourneyLog(logId) {
  if (!confirm('Delete this workout log? This cannot be undone.')) return;
  var logs = loadLogs();
  logs = logs.filter(function(l) { return l.id !== logId; });
  saveLogs(logs);
  state.journeySwiped = null;
  render();
}

  function detectExType(name) {
  var runWords = ['run','jog','sprint','tempo','cardio','walk','5k','bound','acceleration','shuffle','backpedal','treadmill','mile','distance'];
  var n = (name || '').toLowerCase();
  return runWords.some(function(w) { return n.includes(w); }) ? 'running' : 'standard';
}

  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });

function startWorkout(dayIndex) {
  var d = state.days[dayIndex];
  var exercises = [];

  if (d.field) {
    var fieldExes = d.exercises || [];
    fieldExes.forEach(function(ex) {
      exercises.push({
        exName: ex.name,
        tier: 'Speed & Agility',
        type: detectExType(ex.name),
        unit: 'yd',
        static: false,
        sets: []
      });
    });
  } else if (d.tiers) {
    d.tiers.forEach(function(tier, ti) {
      tier.exercises.forEach(function(ex, ei) {
        var tabKey = dayIndex + '-' + ti + '-' + ei;
        var savedTab = state.equipTabs[tabKey] || 0;
        exercises.push({
          exName: ex.name,
          tier: tier.label,
          type: detectExType(ex.name),
          unit: 'mi',
          static: false,
          fw: ex.fw,
          mb: ex.mb,
          bw: ex.bw,
          equipTab: savedTab,
          mainLift: ex.mainLift === true,
          sets: []
        });
      });
    });
  }


  state.activeSession = {
    id: 'log-' + Date.now() + '-' + Math.random().toString(36).slice(2,7),
    dayIndex: dayIndex,
    dayName: d.title,
    dayColor: d.color,
    startedAt: Date.now(),

        html += '<div style="display:grid;grid-template-columns:28px 1fr 1fr 28px;gap:6px;margin-bottom:4px;padding:0 2px;">'
          + '<div style="font-size:9px;font-family:var(--font-body);letter-spacing:0.06em;color:var(--text-mute);text-align:center;">SET</div>'
          + '<div style="font-size:9px;font-family:var(--font-body);letter-spacing:0.06em;color:var(--text-mute);text-align:center;">'
          + (loadTypeVal === 'bw' ? 'BW' : loadTypeVal === 'band' ? 'BAND' : 'LBS') + '</div>'
          + '<div style="font-size:9px;font-family:var(--font-body);letter-spacing:0.06em;color:var(--text-mute);text-align:center;">'
          + (effortTypeVal === 'time' ? 'TIME' : 'REPS') + '</div>'
          + '<div></div>'
          + '</div>';

        ex.sets.forEach(function(set, si) {
          var thisLoad = set.loadType || loadTypeVal;
          html += '<div style="display:grid;grid-template-columns:28px 1fr 1fr 28px;gap:6px;margin-bottom:6px;align-items:center;">'
            + '<div style="font-size:11px;font-family:var(--font-body);color:' + (isComplete ? 'var(--text-mute)' : 'var(--gold-metal)') + ';text-align:center;">' + (si + 1) + '</div>'
            + (thisLoad === 'bw'
              ? '<div style="' + (isComplete ? inputLocked : inputActive) + 'display:flex;align-items:center;justify-content:center;color:var(--text-mute);">BW</div>'
              : '<input type="number" inputmode="decimal" min="1" placeholder="--" value="' + (set.load || '') + '" '
                + (isComplete ? 'disabled ' : 'onchange="updateSet(' + ei + ',' + si + ',\'load\',this.value)" ')
                + 'style="' + (isComplete ? inputLocked : inputActive) + '"/>')
            + '<input type="' + (effortTypeVal === 'time' ? 'text' : 'number') + '" '
            + (effortTypeVal === 'time' ? 'placeholder="00:00" ' : 'inputmode="numeric" min="1" placeholder="--" ')
            + 'value="' + (set.effort || '') + '" '
            + (isComplete ? 'disabled ' : 'onchange="updateSet(' + ei + ',' + si + ',\'effort\',this.value)" ')
            + 'style="' + (isComplete ? inputLocked : inputActive) + '"/>'
            + (isComplete ? '<div></div>' : '<button onclick="removeSet(' + ei + ',' + si + ')" style="background:none;border:none;color:var(--red);font-size:16px;cursor:pointer;padding:0;text-align:center;">×</button>')
            + '</div>';
        });
      }

      // Add set + Complete buttons
      if (!isComplete && !ex.bypassed) {
        html += '<button onclick="addSet(' + ei + ')" '
          + 'style="width:100%;padding:8px;border-radius:10px;margin-top:6px;'
          + 'border:1.5px dashed var(--gold-metal);background:transparent;'
          + 'color:var(--gold-metal);font-size:12px;font-family:var(--font-body);'
          + 'letter-spacing:0.06em;cursor:pointer;margin-bottom:8px;">+ Add Set</button>'
          + '<button onclick="completeExercise(' + ei + ')" '
          + 'style="width:100%;padding:9px;border-radius:10px;'
          + 'border:1px solid ' + acColor + ';background:' + acBg + ';'
          + 'color:' + acColor + ';font-size:12px;font-family:var(--font-body);'
          + 'letter-spacing:0.08em;cursor:pointer;">✓ COMPLETE EXERCISE</button>';
      } else if (isComplete) {
        html += '<button onclick="unlockExercise(' + ei + ')" '
          + 'style="width:100%;padding:9px;border-radius:10px;margin-top:6px;'
          + 'border:1px solid var(--grey-light);background:transparent;'
          + 'color:var(--text-sec);font-size:12px;font-family:var(--font-body);'
          + 'letter-spacing:0.08em;cursor:pointer;">Edit</button>';
      }

      html += '</div>';
    });
  });
  
  // Static cooldown card for field days
  if (state.activeSession.exercises.length > 0 && state.activeSession.exercises[0].tier === 'Speed & Agility') {
    html += '<div style="margin:0 16px 16px;background:#0d0d0d;border:1px solid var(--grey-mid);border-radius:14px;padding:14px;">'
      + '<div style="font-family:var(--font-title);font-size:13px;color:var(--text-mute);margin-bottom:4px;">Cool Down</div>'
      + '<div style="font-size:11px;color:var(--text-mute);font-family:var(--font-body);letter-spacing:0.06em;">Light stretch · Walk it out — not logged</div>'
      + '</div>';
  }
  
  // Finish + Cancel
  html += '<div style="padding:0 16px 16px;">'
    + '<button onclick="finishWorkout()" style="'
    + 'width:100%;padding:14px;border-radius:14px;'
    + 'border:1.5px solid ' + acColor + ';background:' + acGradient + ';color:var(--black);'
    + 'font-size:15px;font-family:var(--font-body);letter-spacing:0.1em;'
    + 'font-weight:700;cursor:pointer;margin-bottom:10px;'
    + 'box-shadow:' + acFinishGlow + ';">✓ FINISH WORKOUT</button>'
    + '<button onclick="cancelWorkout()" style="'
    + 'width:100%;padding:12px;border-radius:14px;'
    + 'border:1px solid var(--grey-light);background:transparent;'
    + 'color:var(--text-sec);font-size:13px;font-family:var(--font-body);'
    + 'letter-spacing:0.06em;cursor:pointer;">Cancel Session</button>'
    + '</div>'
    + '<div class="forge-mark">The Forge &nbsp;·&nbsp; Beta v0.6</div>';

  return html;
}

function unlockExercise(ei) {
  if (!state.activeSession) return;
  state.activeSession.exercises[ei].completed = false;
  render();
}
  
function completeExercise(ei) {
  if (!state.activeSession) return;
  state.activeSession.exercises[ei].completed = true;
  render();
}

function backFromWorkout() {
  state.view = 'day';
  state.dayIndex = state.activeSession.dayIndex;
  closeProfileSheet();
  render();
  document.getElementById('screen').scrollTop = 0;
}
  
function addSet(ei) {
  if (!state.activeSession) return;
  var ex = state.activeSession.exercises[ei];
  var lastSet = ex.sets.slice(-1)[0];
  if (ex.type === 'running') {
    ex.sets.push({
      distance: lastSet ? lastSet.distance : '',
      time: lastSet ? lastSet.time : ''
    });
  } else {
    ex.sets.push({
      load: lastSet ? lastSet.load : '',
      loadType: lastSet ? lastSet.loadType : 'weight',
      effort: lastSet ? lastSet.effort : '',
      effortType: lastSet ? lastSet.effortType : 'reps'
    });
  }
  render();
}

function updateSet(ei, si, field, value) {
  if (!state.activeSession) return;
  state.activeSession.exercises[ei].sets[si][field] = value;
}

function updateAllSetsField(ei, field, value) {
  if (!state.activeSession) return;
  state.activeSession.exercises[ei].sets.forEach(function(set) {
    set[field] = value;
  });
  render();
}

function removeSet(ei, si) {
  if (!state.activeSession) return;
  state.activeSession.exercises[ei].sets.splice(si, 1);
  render();
}

function finishWorkout() {
  if (!state.activeSession) return;
  state.activeSession.completedAt = Date.now();
  var logs = loadLogs();
  logs.push(state.activeSession);
  saveLogs(logs);
  var dayIndex = state.activeSession.dayIndex;
  state.activeSession = null;
  state.view = 'day';
  state.dayIndex = dayIndex;
  closeProfileSheet();
  render();
  document.getElementById('screen').scrollTop = 0;
}

function cancelWorkout() {
  var dayIndex = state.activeSession ? state.activeSession.dayIndex : null;
  state.activeSession = null;
  if (dayIndex !== null) {
    state.view = 'day';
    state.dayIndex = dayIndex;
  } else {
    state.view = 'plan';
    state.dayIndex = null;
  }
  closeProfileSheet();
  render();
  document.getElementById('screen').scrollTop = 0;
}
  
</script>
